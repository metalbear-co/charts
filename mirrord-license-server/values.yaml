# Default values for mirrord-operator-license-server.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

namespace: mirrord

## Whether we should create the namespace or not
createNamespace: false

database:
  # If `kind=sqlite`, all other options are ignored,
  kind: sqlite

  # Required (if `kind=postgres`)
  # host: postgres.something.svc

  # Optional
  # port: 5432

  name: mirrord-license-server

  # auth:
  #   user: postgres
  #   password: postgres

server:
  image: ghcr.io/metalbear-co/operator

  # Override the pull policy, useful for local development.
  # imagePullPolicy: Always

  replicas: 1

  podAnnotations: {}
  podLabels: {}
  jsonLog: false

  # Sets log level for the license server container.
  #
  # See reference: https://docs.rs/tracing-subscriber/latest/tracing_subscriber/filter/struct.EnvFilter.html#directives.
  logLevel: mirrord=info,operator=info

  # imagePullSecrets:
  #   - name: value

  ## This should be enough for around 200~ concurrent sessions.
  limits:
    cpu: 200m
    memory: 200Mi

  ## Allow to specify tolerations for license-server deployment
  # tolerations:
  #   - key: "key1"
  #     operator: "Equal"
  #     value: "value1"
  #     effect: "NoSchedule"

  # affinity:
  #   podAntiAffinity:
  #     requiredDuringSchedulingIgnoredDuringExecution:
  #       - topologyKey: kubernetes.io/hostname
  #         labelSelector:
  #           matchLabels:
  #             k8s-app: mirrord

  # nodeSelector:
  #   kubernetes.io/os: linux

  # Port for license-server to listen on.
  # avoid using lower port since it might conflict with security policies.
  port: 8080

  # Data retention settings.
  retention:
    # Retention period for operator errors stored in the license server (in days).
    operatorErrors: 30

license:
  ## ID of a secret from the Google Secrets Manager.
  ##
  ## If provided, the license server will fetch the license file from this secret.
  ##
  ## To access the secret, the license server will use Application Default Credentials.
  ## The easiest way to provide credentials is by allowing the license server's
  ## Kubernetes ServiceAccount to impersonate a GCP service account.
  ## This can be done with `.sa.gcpSa` setting.
  # gsmRef: "projects/PROJECT_ID/secrets/SECRET_NAME/versions/SECRET_VERSION"
  key: ""
  file:
    secret: mirrord-operator-license-server-license
    # data:
    #   license.pem:
  keyRef: ""

service:
  name: mirrord-operator-license-server

  type: ClusterIP

  # Allow overriding port of service
  # port: 443

pvc:
  ## Allow to specify a StorageClass for license-server pvc,
  # storageClassName: ""

  annotations: {}
  labels: {}

  ## This should be enough for about two hundred thousand sessions
  ## NOTE this might need to change this if this value is lower than minimal provisionable size
  requests:
    storage: 1Gi

  ## The PVC template includes `helm.sh/resource-policy: keep` by default,
  ## which prevents Helm from deleting the PVC (and its data) on uninstall
  ## or upgrade. After installation, also patch the backing PV to use Retain
  ## reclaim policy to prevent data loss if the PVC is manually deleted:
  ##
  ##   kubectl patch pv <pv-name> -p '{"spec":{"persistentVolumeReclaimPolicy":"Retain"}}'

sa:
  name: mirrord-operator-license-server

  ## GCP service account to impersonate.
  # gcpSa: <iam-sa-name>@<iam-sa-project-id>.iam.gserviceaccount.com

tls:
  secret: mirrord-operator-license-server-tls

  # if certmanager is disabled and no tls.key and tls.crt is set,
  # the operator will generate a self-signed certificate.
  certManager:
    enabled: false
    createIssuer: true

    issuer: mirrord-operator-license-server-issuer
    certificate: mirrord-operator-license-server-tls

  data:
    tls.key: ""
    tls.crt: ""

## mirrord admin dashboard configuration.
## When enabled, the license server serves the dashboard UI on a separate port.
## The dashboard is bundled in the operator image and served directly by the
## license server (no separate deployment needed). The license key is
## auto-injected into API requests from the dashboard.
dashboard:
  enabled: false
  port: 8050

## HR / directory sync from an upstream identity provider (Microsoft Graph today).
## When enabled, the license server polls Graph on `syncIntervalMinutes` and
## upserts users + groups (BU / CIO domain / team) into its directory tables,
## populating the dashboard's Adoption tab.
##
## Requires an Azure AD App Registration with these Application permissions on
## Microsoft Graph (admin-consented): User.Read.All, Directory.Read.All. See
## the dashboard onboarding doc for the `az` CLI commands.
directorySync:
  enabled: false

  ## Azure Entra ID tenant the customer's users live in.
  tenantId: ""

  ## App Registration's appId.
  clientId: ""

  ## Secret containing the App Registration's client secret under the key
  ## `clientSecret`. Create with:
  ##   kubectl create secret generic mirrord-directory-sync \
  ##     --from-literal=clientSecret=<...>
  clientSecretRef:
    name: mirrord-directory-sync
    key: clientSecret

  ## How operator_events rows are joined to directory users. Either:
  ##   - kubernetes_username  (k8s user from RBAC, usually email-shaped)
  ##   - client_username      (user's local OS username — required for setups
  ##                          where many devs share a k8s user)
  joinKey: kubernetes_username

  ## Background sync cadence. The admin endpoint
  ##   POST /api/v1/admin/directory/sync
  ## forces an immediate sync regardless of this interval.
  syncIntervalMinutes: 60

## SAML 2.0 Single Sign-On for the dashboard. When enabled the dashboard
## redirects unauthenticated requests to the IdP and issues a JWT cookie
## post-assertion. Role (engineer / manager / admin) is derived from the
## SAML group claim using `adminGroupId` / `managerGroupId` below.
##
## Requires a SAML enterprise app at the IdP with reply URL set to
##   <dashboardBaseUrl>/api/v1/auth/saml/callback
## See the onboarding doc for `az` CLI commands to configure Azure as an
## IdP (any SAML 2.0 IdP — Azure, Okta, ADFS, Auth0 — works).
saml:
  enabled: false

  ## SAML SP entity ID. Convention with Azure is
  ##   api://<tenantId>/<some-name>
  spEntityId: ""

  ## SAML Assertion Consumer Service URL. Must be reachable from the IdP and
  ## match the reply URL configured on the SAML enterprise app.
  spAcsUrl: ""

  ## ConfigMap holding the IdP federation metadata XML under key
  ## `idp-metadata.xml`. Create with:
  ##   kubectl create configmap mirrord-saml-idp-metadata \
  ##     --from-file=idp-metadata.xml=<(curl -s "https://login.microsoftonline.com/$TENANT/FederationMetadata/2007-06/FederationMetadata.xml?appid=$APP")
  idpMetadataConfigMap:
    name: mirrord-saml-idp-metadata
    key: idp-metadata.xml

  ## Secret containing the JWT signing secret under key `jwtSecret`. Create with:
  ##   kubectl create secret generic mirrord-saml-jwt \
  ##     --from-literal=jwtSecret=$(openssl rand -base64 48)
  jwtSecretRef:
    name: mirrord-saml-jwt
    key: jwtSecret

  ## Session TTL — re-prompts SAML SSO after this many seconds.
  sessionTtlSeconds: 3600

  ## Optional. Azure AD security group object IDs that map to elevated roles.
  ## Users not in either group are mapped to `engineer`. To populate the SAML
  ## `groups` claim, patch the SAML app:
  ##   az rest --method PATCH --url "https://graph.microsoft.com/v1.0/applications/<saml-app-id>" \
  ##     --body '{"groupMembershipClaims": "SecurityGroup"}'
  adminGroupId: ""
  managerGroupId: ""
