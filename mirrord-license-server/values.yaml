# Default values for mirrord-operator-license-server.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

namespace: mirrord

## Whether we should create the namespace or not
createNamespace: false

database:
  # If `kind=sqlite`, all other options are ignored,
  kind: sqlite

  migrateFromSqlite: false

  # Required (if `kind=postgres`)
  # host: postgres.something.svc

  # Optional
  # port: 5432

  name: mirrord-license-server

  # auth:
  #   user: postgres
  #   password: postgres
  #   awsIam: false

  ## Run a Cloud SQL Auth Proxy sidecar and connect to a GCP Cloud SQL instance through it.
  ## Requires `kind=postgres`. Set `database.host` to 127.0.0.1 so the license server
  ## connects via the sidecar.
  cloudSqlProxy:
    enabled: false

    ## Cloud SQL instance connection name in the form <project>:<region>:<instance>
    instance: ""

    ## Authenticate to the database with the pod's IAM identity (Workload Identity,
    ## see `sa.gcpSa`). `database.auth.user` should be the IAM user name (service
    ## account email without the ".gserviceaccount.com" suffix), no password needed.
    autoIamAuthn: true

    ## Connect to the instance over its private IP.
    privateIp: false

    port: 5432

    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

server:
  image: ghcr.io/metalbear-co/operator

  # Override the pull policy, useful for local development.
  # imagePullPolicy: Always

  replicas: 1

  podAnnotations: {}
  podLabels: {}
  jsonLog: false

  # Define additional environment variables for the license-server.
  extraEnv: {}

  # Sets log level for the license server container.
  #
  # See reference: https://docs.rs/tracing-subscriber/latest/tracing_subscriber/filter/struct.EnvFilter.html#directives.
  logLevel: mirrord=info,operator=info

  # imagePullSecrets:
  #   - name: value

  ## This should be enough for around 200~ concurrent sessions.
  limits:
    cpu: 200m
    memory: 200Mi

  ## Allow to specify tolerations for license-server deployment
  # tolerations:
  #   - key: "key1"
  #     operator: "Equal"
  #     value: "value1"
  #     effect: "NoSchedule"

  # affinity:
  #   podAntiAffinity:
  #     requiredDuringSchedulingIgnoredDuringExecution:
  #       - topologyKey: kubernetes.io/hostname
  #         labelSelector:
  #           matchLabels:
  #             k8s-app: mirrord

  # nodeSelector:
  #   kubernetes.io/os: linux

  # Port for license-server to listen on.
  # avoid using lower port since it might conflict with security policies.
  port: 8080

  # Data retention settings.
  retention:
    # Retention period for operator errors stored in the license server (in days).
    operatorErrors: 30

license:
  ## ID of a Google Secret Manager secret containing the license PEM file.
  ##
  ## If provided, the license server will fetch the license file from this secret.
  ##
  ## To access the secret, the license server will use Application Default Credentials.
  ## The easiest way to provide credentials is by allowing the license server's
  ## Kubernetes ServiceAccount to impersonate a GCP service account.
  ## This can be done with `.sa.gcpSa` setting.
  # pemGsmRef: "projects/PROJECT_ID/secrets/SECRET_NAME/versions/SECRET_VERSION"

  ## ID of a Google Secret Manager secret containing the license key.
  ##
  ## If provided, the license server will fetch the license key from this secret.
  ##
  ## Uses the same authentication behavior described for `pemGsmRef` above.
  # keyGsmRef: "projects/PROJECT_ID/secrets/SECRET_NAME/versions/SECRET_VERSION"

  key: ""

  file:
    secret: mirrord-operator-license-server-license
    # data:
    #   license.pem:
  keyRef: ""

service:
  name: mirrord-operator-license-server

  type: ClusterIP

  # Allow overriding port of service
  # port: 443

pvc:
  ## Allow to specify a StorageClass for license-server pvc,
  # storageClassName: ""

  annotations: {}
  labels: {}

  ## This should be enough for about two hundred thousand sessions
  ## NOTE this might need to change this if this value is lower than minimal provisionable size
  requests:
    storage: 1Gi

  ## The PVC template includes `helm.sh/resource-policy: keep` by default,
  ## which prevents Helm from deleting the PVC (and its data) on uninstall
  ## or upgrade. After installation, also patch the backing PV to use Retain
  ## reclaim policy to prevent data loss if the PVC is manually deleted:
  ##
  ##   kubectl patch pv <pv-name> -p '{"spec":{"persistentVolumeReclaimPolicy":"Retain"}}'

sa:
  name: mirrord-operator-license-server

  ## GCP service account to impersonate.
  # gcpSa: <iam-sa-name>@<iam-sa-project-id>.iam.gserviceaccount.com

tls:
  secret: mirrord-operator-license-server-tls

  certManager:
    enabled: false
    createIssuer: true

    issuer: mirrord-operator-license-server-issuer
    certificate: mirrord-operator-license-server-tls

  data:
    tls.key: ""
    tls.crt: ""

## mirrord admin dashboard configuration.
## When enabled, the license server serves the dashboard UI on a separate port.
## The dashboard is bundled in the operator image and served directly by the
## license server (no separate deployment needed). The license key is
## auto-injected into API requests from the dashboard.
dashboard:
  enabled: false
  port: 8050

  ## Whether the adoption view is shown in the dashboard.
  ## Off by default: the adoption view requires the Postgres backend
  ## (`database.kind=postgres`) and is still maturing, so it is opt-in.
  adoptionEnabled: false

  ## Whether the deployments view is shown in the dashboard.
  ## Off by default: the deployments view requires the Postgres backend
  ## (`database.kind=postgres`) and is still maturing, so it is opt-in.
  deploymentsEnabled: false

  ## Optional regex whose matches are removed from user identifiers shown in the
  ## dashboard, e.g. `^keycloak:` so `keycloak:jane.doe` renders as `jane.doe`.
  ## Display-only: it does not affect how seats are counted or how usage joins to
  ## directory users. Leave unset to show identifiers unchanged.
  ## displayNameStrip: "^keycloak:"

## Optional SAML front-proxy sidecar for the dashboard.
##
## Requires dashboard.enabled=true.
##
## When enabled, the license-server only binds dashboard API to localhost and all public traffic
## must flow through the proxy sidecar. Existing tls.* settings continue to apply:
## the proxy terminates HTTPS with the same certificate, while the Rust server
## switches to localhost-only HTTP. The installer is expected to provide the
## proxy config and any SAML metadata/certificate files the proxy needs.
saml:
  enabled: false

  proxy:
    image: ghcr.io/metalbear-co/saml-proxy
    tag: 1.0.0

    # Override the pull policy, useful for local development.
    imagePullPolicy: IfNotPresent

    # extraEnv:
    #   HTTPD_LOG_LEVEL: debug

    # Resources for the front-proxy sidecar.
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

    assets:
      # Secret with the SAML files used by mod_auth_mellon.
      #
      # The generated Apache config expects the following files:
      # - idp-metadata.xml  (must include the IdP's signing certificate, i.e. a
      #   <KeyDescriptor use="signing"> in the IDPSSODescriptor; mod_auth_mellon rejects
      #   assertions with "provider has no known public key" otherwise. For Azure AD use the
      #   full app federation metadata from
      #   https://login.microsoftonline.com/<tenant>/federationmetadata/2007-06/federationmetadata.xml?appid=<appId>)
      # - sp-metadata.xml
      # - sp.key   (SAML Service Provider private key, separate from tls.key)
      # - sp.cert  (SAML Service Provider certificate, separate from tls.crt)
      #
      # You can either reference an existing secret with `.existingSecret`
      # or let Helm create one using `.data`.
      #
      # existingSecret: my-license-server-saml-assets
      mountPath: /mellon
      # data:
      #   idp-metadata.xml: |
      #     <EntityDescriptor>...</EntityDescriptor>
      #   sp-metadata.xml: |
      #     <EntityDescriptor>...</EntityDescriptor>
      #   sp.key: |
      #     -----BEGIN PRIVATE KEY-----
      #     ...
      #     -----END PRIVATE KEY-----
      #   sp.cert: |
      #     -----BEGIN CERTIFICATE-----
      #     ...
      #     -----END CERTIFICATE-----
