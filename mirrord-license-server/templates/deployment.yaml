{{- if and (gt (int .Values.server.replicas) 1) (eq .Values.database.kind "sqlite") }}
  {{- fail "unable to set more than 1 replica when using sqlite, please switch to postgres database for multiple replicas" }}
{{- end }}
{{- $pemGsmRef := coalesce .Values.license.pemGsmRef .Values.license.gsmRef }}
{{- $tlsEnabled := or (not (empty (index .Values.tls.data "tls.key"))) .Values.tls.certManager.enabled }}
{{- if and .Values.license.pemGsmRef .Values.license.gsmRef }}
  {{- fail "license.pemGsmRef conflicts with a legacy PEM GSM value; only one can be set." }}
{{- end }}
{{- if and .Values.license.key .Values.license.keyRef }}
  {{- fail "Only one of license.key, license.keyRef, or license.keyGsmRef can be set." }}
{{- end }}
{{- if and .Values.license.key .Values.license.keyGsmRef }}
  {{- fail "Only one of license.key, license.keyRef, or license.keyGsmRef can be set." }}
{{- end }}
{{- if and .Values.license.keyRef .Values.license.keyGsmRef }}
  {{- fail "Only one of license.key, license.keyRef, or license.keyGsmRef can be set." }}
{{- end }}
{{- if and $pemGsmRef .Values.license.file.data }}
  {{- fail "Only one of license.pemGsmRef or license.file.data can be set." }}
{{- end }}
{{- if and .Values.saml.enabled (not .Values.dashboard.enabled) }}
  {{- fail "saml.enabled=true requires dashboard.enabled=true" }}
{{- end }}
{{- if and .Values.saml.enabled .Values.dashboard.enabled (not (or .Values.saml.proxy.assets.existingSecret .Values.saml.proxy.assets.data)) }}
  {{- fail "saml.proxy.assets.existingSecret or saml.proxy.assets.data is required when saml.enabled=true" }}
{{- end }}
{{- if and .Values.database.cloudSqlProxy.enabled (ne .Values.database.kind "postgres") }}
  {{- fail "database.cloudSqlProxy.enabled=true requires database.kind=postgres" }}
{{- end }}
{{- if and .Values.database.cloudSqlProxy.enabled (not .Values.database.cloudSqlProxy.instance) }}
  {{- fail "database.cloudSqlProxy.instance is required when database.cloudSqlProxy.enabled=true" }}
{{- end }}
{{- if and .Values.dashboard.adoptionEnabled (ne .Values.database.kind "postgres") }}
  {{- fail "dashboard.adoptionEnabled=true requires database.kind=postgres" }}
{{- end }}

apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: mirrord-license-server
    component: license-server
    app.kubernetes.io/component: license-server
    {{- include "mirrord-license-server.labels" . | nindent 4 }}
  name: mirrord-license-server
  namespace: {{ .Values.namespace }}
spec:
  selector:
    matchLabels:
      app: mirrord-license-server
  {{- if or (eq .Values.database.kind "sqlite") .Values.database.migrateFromSqlite }}
  strategy:
    # This is needed, as the license server uses a ReadWriteOnce PVC.
    type: Recreate
  {{- end }}
  replicas: {{ .Values.server.replicas }}
  template:
    metadata:
      labels:
        {{- include "mirrord-license-server.labels" . | nindent 8 }}
        app: mirrord-license-server
        component: license-server
        app.kubernetes.io/component: license-server
        {{- if .Values.server.podLabels }}
          {{- toYaml .Values.server.podLabels | nindent 8 }}
        {{- end }}
      annotations:
        {{- if .Values.server.podAnnotations }}
          {{- toYaml .Values.server.podAnnotations | nindent 8 }}
        {{- end }}
    spec:
      {{- if .Values.server.imagePullSecrets }}
      imagePullSecrets:
        {{- range .Values.server.imagePullSecrets }}
        - {{ toYaml . }}
        {{- end }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 2000
        fsGroup: 2000
        {{/* Allow low port using ip_unprivileged_port_start */}}
        {{- if or (lt (int .Values.server.port) 1024) (lt (int .Values.dashboard.port) 1024) -}}
        sysctls:
        - name: net.ipv4.ip_unprivileged_port_start
          value: {{ min (int .Values.server.port) (int .Values.dashboard.port) | quote}}
        {{- end }}
      {{- if .Values.server.tolerations }}
      tolerations:
        {{- toYaml .Values.server.tolerations | nindent 8 }}
      {{- end }}
      {{- with .Values.server.nodeSelector }}
      nodeSelector:
        {{- toYaml . | trim | nindent 8 }}
      {{- end }}
      {{- with .Values.server.affinity }}
      affinity:
        {{- toYaml . | trim | nindent 8 }}
      {{- end }}

      containers:
      # License server container
      - args: ["license-server"]
        env:
        - name: RUST_LOG
          value: {{ .Values.server.logLevel }}
        - name: ADDRESS
          value: {{ printf "0.0.0.0:%d" (int .Values.server.port ) }}
        {{- if eq .Values.database.kind "sqlite" }}
        - name: DATABASE_URL
          value: sqlite:///opt/mirrord/data/license-server.db?mode=rwc
        {{- else if eq .Values.database.kind "postgres" }}
        - name: DATABASE_TYPE
          value: "postgres"
        {{- if .Values.database.migrateFromSqlite }}
        - name: MIGRATE_DATABASE_URL
          value: sqlite:///opt/mirrord/data/license-server.db
        {{- end }}
        {{- if kindIs "string" .Values.database.host }}
        - name: PGHOST
          value: {{ .Values.database.host | quote }}
        {{- else if and .Values.database.host .Values.database.host.configMapKeyRef }}
        - name: PGHOST
          valueFrom:
            configMapKeyRef: 
              {{- toYaml .Values.database.host.configMapKeyRef | nindent 14 }}
        {{- else if and .Values.database.host .Values.database.host.secretKeyRef }}
        - name: PGHOST
          valueFrom:
            secretKeyRef: 
              {{- toYaml .Values.database.host.secretKeyRef | nindent 14 }}
        {{- end }}
        {{- if kindIs "string" .Values.database.name }}
        - name: PGDATABASE
          value: {{ .Values.database.name | quote }}
        {{- else if and .Values.database.name .Values.database.name.configMapKeyRef }}
        - name: PGDATABASE
          valueFrom:
            configMapKeyRef: 
              {{- toYaml .Values.database.name.configMapKeyRef | nindent 14 }}
        {{- else if and .Values.database.name .Values.database.name.secretKeyRef }}
        - name: PGDATABASE
          valueFrom:
            secretKeyRef: 
              {{- toYaml .Values.database.name.secretKeyRef | nindent 14 }}
        {{- end }}
        {{- if .Values.database.auth }}
        - name: DATABASE_AWS_RDS_AUTH
          value: {{ (or .Values.database.auth.awsIam false) | ternary "true" "false" | quote }}
        {{- if kindIs "string" .Values.database.auth.user }}
        - name: PGUSER
          value: {{ .Values.database.auth.user | quote }}
        {{- else if and .Values.database.auth.user .Values.database.auth.user.configMapKeyRef }}
        - name: PGUSER
          valueFrom:
            configMapKeyRef: 
              {{- toYaml .Values.database.auth.user.configMapKeyRef | nindent 14 }}
        {{- else if and .Values.database.auth.user .Values.database.auth.user.secretKeyRef }}
        - name: PGUSER
          valueFrom:
            secretKeyRef: 
              {{- toYaml .Values.database.auth.user.secretKeyRef | nindent 14 }}
        {{- end }}
        {{- if kindIs "string" .Values.database.auth.password }}
        - name: PGPASSWORD
          value: {{ .Values.database.auth.password | quote }}
        {{- else if and .Values.database.auth.password .Values.database.auth.password.configMapKeyRef }}
        - name: PGPASSWORD
          valueFrom:
            configMapKeyRef: 
              {{- toYaml .Values.database.auth.password.configMapKeyRef | nindent 14 }}
        {{- else if and .Values.database.auth.password .Values.database.auth.password.secretKeyRef }}
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef: 
              {{- toYaml .Values.database.auth.password.secretKeyRef | nindent 14 }}
        {{- end }}
        {{- end }}
        {{- if or .Values.database.tls (and .Values.database.auth .Values.database.auth.awsIam) }}
        - name: PGSSLMODE
          value: "VerifyFull"
        {{- end }}
        {{- end }}
        - name: JSON_LOG
          value: {{ .Values.server.jsonLog | ternary "true" "false" | quote }}
        {{- if .Values.dashboard.enabled }}
        - name: DASHBOARD_ADDRESS
        {{- if .Values.saml.enabled }}
          # SAML proxy listens on the dashboard port on public IP.
          # License server listens on a different port on localhost.
          value: {{ printf "127.0.0.1:%d" (add (int .Values.dashboard.port) 1) | quote }}
        {{- else }}
          # There is no proxy.
          # License server listens on the dashboard port on public IP.
          value: {{ printf "0.0.0.0:%d" (int .Values.dashboard.port) | quote }}
        {{- end }}
        {{- if .Values.saml.enabled }}
        # SAML proxy terminates TLS and injects verified headers.
        - name: DASHBOARD_AUTH_PROXY
          value: "true"
        {{- end }}
        {{- if .Values.dashboard.adoptionEnabled }}
        - name: DASHBOARD_ADOPTION_ENABLED
          value: "true"
        {{- end }}
        {{- if .Values.dashboard.displayNameStrip }}
        - name: DASHBOARD_DISPLAY_NAME_STRIP
          value: {{ .Values.dashboard.displayNameStrip | quote }}
        {{- end }}
        {{- end }}
        - name: ERROR_EVENTS_RETENTION_DAYS
          value: {{ .Values.server.retention.operatorErrors | quote }}
        {{- if $tlsEnabled }}
        - name: TLS_CERT_PATH
          value: /tls/tls.crt
        - name: TLS_KEY_PATH
          value: /tls/tls.key
        {{- end }}
        {{- range $key, $val := .Values.server.extraEnv }}
        - name: {{ $key }}
          value: {{ $val | quote }}
        {{- end }}
        {{- if $pemGsmRef }}
        - name: OPERATOR_LICENSE_GSM_REF
          value: {{ $pemGsmRef | quote }}
        {{- else }}
        - name: LICENSE_PATH
          value: /license/license.pem
        {{- end }}
        {{- if .Values.license.key  }}
        - name: LICENSE_KEY
          value: {{ .Values.license.key | quote }}
        {{- else if .Values.license.keyGsmRef }}
        - name: OPERATOR_LICENSE_KEY_GSM_REF
          value: {{ .Values.license.keyGsmRef | quote }}
        {{- else if .Values.license.keyRef }}
        envFrom:
        - secretRef:
            name: {{ .Values.license.keyRef }}
        {{- else }}
          {{- fail "Either .license.key, .license.keyRef, or .license.keyGsmRef value is required" }}
        {{- end }}
        image: {{ .Values.server.image }}:{{ or .Values.server.tag .Chart.AppVersion }}
        imagePullPolicy: {{ default "IfNotPresent" .Values.server.imagePullPolicy }}
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.server.port }}
            scheme: {{ $tlsEnabled | ternary "HTTPS" "HTTP" | quote }}
          periodSeconds: 5
        name: license-server
        ports:
        - containerPort: {{ .Values.server.port }}
          name: https
        {{- if and .Values.dashboard.enabled (not .Values.saml.enabled) }}
        - containerPort: {{ .Values.dashboard.port }}
          name: dashboard
        {{- end }}
        readinessProbe:
          httpGet:
            path: /health
            port: {{ .Values.server.port }}
            scheme: {{ $tlsEnabled | ternary "HTTPS" "HTTP" | quote }}
          periodSeconds: 5
        resources:
          requests:
            cpu: 100m
            memory: 100Mi
          limits:
            cpu: {{.Values.server.limits.cpu}}
            memory: {{.Values.server.limits.memory}}
        securityContext:
          allowPrivilegeEscalation: false
          privileged: false
          readOnlyRootFilesystem: true
        volumeMounts:
        {{- if $tlsEnabled }}
        - mountPath: /tls
          name: tls-volume
        {{- end }}
        {{- if not $pemGsmRef }}
        # Only when we have the license in a k8s secret.
        - mountPath: /license
          name: license-volume
        {{- end }}
        # needed for the license-server create sqlite database
        {{- if or (eq .Values.database.kind "sqlite") .Values.database.migrateFromSqlite }}
        - mountPath: /opt/mirrord/data
          name: data
        {{- end }}
        - mountPath: /tmp
          name: tmp

      {{- if and .Values.saml.enabled .Values.dashboard.enabled }}
      # SAML proxy container
      - name: saml-proxy
        image: {{ .Values.saml.proxy.image }}:{{ .Values.saml.proxy.tag }}
        imagePullPolicy: {{ default "IfNotPresent" .Values.saml.proxy.imagePullPolicy }}
        {{- if .Values.saml.proxy.extraEnv }}
        env:
        {{- range $name, $value := .Values.saml.proxy.extraEnv }}
        - name: {{ $name }}
          value: {{ $value | quote }}
        {{- end }}
        {{- end }}
        ports:
        - containerPort: {{ .Values.dashboard.port }}
          name: dashboard
        resources:
          {{- toYaml .Values.saml.proxy.resources | nindent 10 }}
        securityContext:
          allowPrivilegeEscalation: false
          privileged: false
          readOnlyRootFilesystem: false
        volumeMounts:
        - mountPath: /usr/local/apache2/conf/httpd.conf
          name: saml-proxy-config
          subPath: httpd.conf
        {{- if or .Values.saml.proxy.assets.existingSecret .Values.saml.proxy.assets.data }}
        - mountPath: {{ .Values.saml.proxy.assets.mountPath }}
          name: saml-proxy-assets
          readOnly: true
        {{- end }}
        {{- if $tlsEnabled }}
        - mountPath: /tls
          name: tls-volume
        {{- end }}
        - mountPath: /tmp
          name: tmp
      {{- end }}

      {{- if .Values.database.cloudSqlProxy.enabled }}
      # Cloud SQL Auth Proxy sidecar, see `database.cloudSqlProxy` in values.yaml.
      - name: cloud-sql-proxy
        image: {{ .Values.database.cloudSqlProxy.image }}
        args:
        - "--structured-logs"
        - "--port={{ int .Values.database.cloudSqlProxy.port }}"
        {{- if .Values.database.cloudSqlProxy.autoIamAuthn }}
        - "--auto-iam-authn"
        {{- end }}
        {{- if .Values.database.cloudSqlProxy.privateIp }}
        - "--private-ip"
        {{- end }}
        - {{ .Values.database.cloudSqlProxy.instance | quote }}
        securityContext:
          allowPrivilegeEscalation: false
          privileged: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
        resources:
          {{- toYaml .Values.database.cloudSqlProxy.resources | nindent 10 }}
      {{- end }}

      serviceAccountName: {{ .Values.sa.name }}
      volumes:
      {{- if $tlsEnabled }}
      - name: tls-volume
        secret:
          secretName: {{ .Values.tls.secret }}
      {{- end }}
      {{- if not $pemGsmRef }}
      # Only when we have the license in a k8s secret.
      - name: license-volume
        secret:
          secretName: {{ .Values.license.file.secret }}
      {{- end }}
      {{- if or (eq .Values.database.kind "sqlite") .Values.database.migrateFromSqlite }}
      - name: data
        persistentVolumeClaim:
          claimName: mirrord-license-server-pvc
      {{- end }}
      {{- if and .Values.saml.enabled .Values.dashboard.enabled }}
      - name: saml-proxy-config
        configMap:
          name: {{ include "mirrord-license-server.samlProxyConfigMapName" . }}
      {{- if or .Values.saml.proxy.assets.existingSecret .Values.saml.proxy.assets.data }}
      - name: saml-proxy-assets
        secret:
          secretName: {{ default (include "mirrord-license-server.samlProxyAssetsSecretName" .) .Values.saml.proxy.assets.existingSecret }}
      {{- end }}
      {{- end }}
      - emptyDir: {}
        name: tmp
