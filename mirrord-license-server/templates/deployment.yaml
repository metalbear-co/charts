{{- if and (gt (int .Values.server.replicas) 1) (eq .Values.database.kind "sqlite") }}
  {{- fail "unable to set more than 1 replica when using sqlite, please switch to postgres database for multiple replicas" }}
{{- end }}

apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: mirrord-license-server
    component: license-server
    app.kubernetes.io/component: license-server
    {{- include "mirrord-license-server.labels" . | nindent 4 }}
  name: mirrord-license-server
  namespace: {{ .Values.namespace }}
spec:
  selector:
    matchLabels:
      app: mirrord-license-server
  {{- if eq .Values.database.kind "sqlite" }}
  strategy:
    # This is needed, as the license server uses a ReadWriteOnce PVC.
    type: Recreate
  {{- end }}
  replicas: {{ .Values.server.replicas }}
  template:
    metadata:
      labels:
        {{- include "mirrord-license-server.labels" . | nindent 8 }}
        app: mirrord-license-server
        component: license-server
        app.kubernetes.io/component: license-server
        {{- if .Values.server.podLabels }}
          {{- toYaml .Values.server.podLabels | nindent 8 }}
        {{- end }}
      annotations:
        {{- if .Values.server.podAnnotations }}
          {{- toYaml .Values.server.podAnnotations | nindent 8 }}
        {{- end }}
    spec:
      {{- if .Values.server.imagePullSecrets }}
      imagePullSecrets:
        {{- range .Values.server.imagePullSecrets }}
        - {{ toYaml . }}
        {{- end }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 2000
        fsGroup: 2000
        {{/* Allow low port using ip_unprivileged_port_start */}}
        {{- if lt (int .Values.server.port) 1024 -}}
        sysctls:
        - name: net.ipv4.ip_unprivileged_port_start
          value: {{ .Values.server.port | quote}}
        {{- end }}
      {{- if .Values.server.tolerations }}
      tolerations:
        {{- toYaml .Values.server.tolerations | nindent 8 }}
      {{- end }}
      {{- with .Values.server.nodeSelector }}
      nodeSelector:
        {{- toYaml . | trim | nindent 8 }}
      {{- end }}
      {{- with .Values.server.affinity }}
      affinity:
        {{- toYaml . | trim | nindent 8 }}
      {{- end }}

      containers:
      - args: ["license-server"]
        env:
        - name: RUST_LOG
          value: {{ .Values.server.logLevel }}
        - name: ADDRESS
          value: {{ printf "0.0.0.0:%d" (int .Values.server.port ) }}
        {{- if eq .Values.database.kind "sqlite" }}
        - name: DATABASE_URL
          value: sqlite:///opt/mirrord/data/license-server.db?mode=rwc
        {{- else if eq .Values.database.kind "postgres" }}
        - name: DATABASE_TYPE
          value: "postgres"
        {{- if kindIs "string" .Values.database.host }}
        - name: PGHOST
          value: {{ .Values.database.host | quote }}
        {{- else if and .Values.database.host .Values.database.host.configMapKeyRef }}
        - name: PGHOST
          valueFrom:
            configMapKeyRef: 
              {{- toYaml .Values.database.host.configMapKeyRef | nindent 14 }}
        {{- else if and .Values.database.host .Values.database.host.secretKeyRef }}
        - name: PGHOST
          valueFrom:
            secretKeyRef: 
              {{- toYaml .Values.database.host.secretKeyRef | nindent 14 }}
        {{- end }}
        {{- if kindIs "string" .Values.database.name }}
        - name: PGDATABASE
          value: {{ .Values.database.name | quote }}
        {{- else if and .Values.database.name .Values.database.name.configMapKeyRef }}
        - name: PGDATABASE
          valueFrom:
            configMapKeyRef: 
              {{- toYaml .Values.database.name.configMapKeyRef | nindent 14 }}
        {{- else if and .Values.database.name .Values.database.name.secretKeyRef }}
        - name: PGDATABASE
          valueFrom:
            secretKeyRef: 
              {{- toYaml .Values.database.name.secretKeyRef | nindent 14 }}
        {{- end }}
        {{- if .Values.database.auth }}
        {{- if kindIs "string" .Values.database.auth.user }}
        - name: PGUSER
          value: {{ .Values.database.auth.user | quote }}
        {{- else if and .Values.database.auth.user .Values.database.auth.user.configMapKeyRef }}
        - name: PGUSER
          valueFrom:
            configMapKeyRef: 
              {{- toYaml .Values.database.auth.user.configMapKeyRef | nindent 14 }}
        {{- else if and .Values.database.auth.user .Values.database.auth.user.secretKeyRef }}
        - name: PGUSER
          valueFrom:
            secretKeyRef: 
              {{- toYaml .Values.database.auth.user.secretKeyRef | nindent 14 }}
        {{- end }}
        {{- if kindIs "string" .Values.database.auth.password }}
        - name: PGPASSWORD
          value: {{ .Values.database.auth.password | quote }}
        {{- else if and .Values.database.auth.password .Values.database.auth.password.configMapKeyRef }}
        - name: PGPASSWORD
          valueFrom:
            configMapKeyRef: 
              {{- toYaml .Values.database.auth.password.configMapKeyRef | nindent 14 }}
        {{- else if and .Values.database.auth.password .Values.database.auth.password.secretKeyRef }}
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef: 
              {{- toYaml .Values.database.auth.password.secretKeyRef | nindent 14 }}
        {{- end }}
        {{- end }}
        {{- if .Values.database.tls }}
        - name: PGSSLMODE
          value: "VerifyFull"
        {{- end }}
        {{- end }}
        - name: JSON_LOG
          value: {{ .Values.server.jsonLog | ternary "true" "false" | quote }}
        {{- if .Values.dashboard.enabled }}
        - name: DASHBOARD_ENABLED
          value: "true"
        - name: DASHBOARD_PORT
          value: {{ .Values.dashboard.port | quote }}
        {{- end }}
        - name: ERROR_EVENTS_RETENTION_DAYS
          value: {{ .Values.server.retention.operatorErrors | quote }}
        {{- if or (index .Values.tls.data "tls.key") .Values.tls.certManager.enabled }}
        - name: TLS_CERT_PATH
          value: /tls/tls.crt
        - name: TLS_KEY_PATH
          value: /tls/tls.key
        {{- end }}
        {{- if .Values.license.gsmRef }}
        - name: OPERATOR_LICENSE_GSM_REF
          value: {{ .Values.license.gsmRef }}
        {{- else }}
        - name: LICENSE_PATH
          value: /license/license.pem
        {{- end }}
        {{- if .Values.license.key  }}
        - name: LICENSE_KEY
          value: {{ .Values.license.key }}
        {{- end }}
        {{- if .Values.directorySync.enabled }}
        {{- if not .Values.directorySync.tenantId }}
          {{- fail ".directorySync.enabled requires .directorySync.tenantId" }}
        {{- end }}
        {{- if not .Values.directorySync.clientId }}
          {{- fail ".directorySync.enabled requires .directorySync.clientId" }}
        {{- end }}
        - name: DIRECTORY_TENANT_ID
          value: {{ .Values.directorySync.tenantId | quote }}
        - name: DIRECTORY_CLIENT_ID
          value: {{ .Values.directorySync.clientId | quote }}
        - name: DIRECTORY_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Values.directorySync.clientSecretRef.name }}
              key: {{ .Values.directorySync.clientSecretRef.key }}
        - name: DIRECTORY_JOIN_KEY
          value: {{ .Values.directorySync.joinKey | quote }}
        - name: DIRECTORY_SYNC_INTERVAL_MINUTES
          value: {{ .Values.directorySync.syncIntervalMinutes | quote }}
        {{- end }}
        {{- if .Values.saml.enabled }}
        {{- if not .Values.saml.spEntityId }}
          {{- fail ".saml.enabled requires .saml.spEntityId" }}
        {{- end }}
        {{- if not .Values.saml.spAcsUrl }}
          {{- fail ".saml.enabled requires .saml.spAcsUrl" }}
        {{- end }}
        - name: SAML_SP_ENTITY_ID
          value: {{ .Values.saml.spEntityId | quote }}
        - name: SAML_SP_ACS_URL
          value: {{ .Values.saml.spAcsUrl | quote }}
        - name: SAML_IDP_METADATA_PATH
          value: /etc/mirrord-saml/{{ .Values.saml.idpMetadataConfigMap.key }}
        - name: SAML_JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Values.saml.jwtSecretRef.name }}
              key: {{ .Values.saml.jwtSecretRef.key }}
        - name: SAML_SESSION_TTL_SECONDS
          value: {{ .Values.saml.sessionTtlSeconds | quote }}
        {{- if .Values.saml.adminGroupId }}
        - name: SAML_ADMIN_GROUP_ID
          value: {{ .Values.saml.adminGroupId | quote }}
        {{- end }}
        {{- if .Values.saml.managerGroupId }}
        - name: SAML_MANAGER_GROUP_ID
          value: {{ .Values.saml.managerGroupId | quote }}
        {{- end }}
        {{- end }}
        {{- if .Values.license.keyRef }}
        envFrom:
        - secretRef:
            name: {{ .Values.license.keyRef }}
        {{- else if not .Values.license.key }}
          {{- fail "Either .license.keyRef or .license.key value is required" }}
        {{- end }}
        image: {{ .Values.server.image }}:{{ or .Values.server.tag .Chart.AppVersion }}
        imagePullPolicy: {{ default "IfNotPresent" .Values.server.imagePullPolicy }}
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.server.port }}
            scheme: {{ or (index .Values.tls.data "tls.key") .Values.tls.certManager.enabled | ternary "HTTPS" "HTTP" | quote }}
          periodSeconds: 5
        name: license-server
        ports:
        - containerPort: {{ .Values.server.port }}
          name: https
        {{- if .Values.dashboard.enabled }}
        - containerPort: {{ .Values.dashboard.port }}
          name: dashboard
        {{- end }}
        readinessProbe:
          httpGet:
            path: /health
            port: {{ .Values.server.port }}
            scheme: {{ or (index .Values.tls.data "tls.key") .Values.tls.certManager.enabled | ternary "HTTPS" "HTTP" | quote }}
          periodSeconds: 5
        resources:
          requests:
            cpu: 100m
            memory: 100Mi
          limits:
            cpu: {{.Values.server.limits.cpu}}
            memory: {{.Values.server.limits.memory}}
        securityContext:
          allowPrivilegeEscalation: false
          privileged: false
          readOnlyRootFilesystem: true
        volumeMounts:
        {{- if or (index .Values.tls.data "tls.key") .Values.tls.certManager.enabled }}
        - mountPath: /tls
          name: tls-volume
        {{- end }}
        {{- if not .Values.license.gsmRef }}
        # Only when we have the license in a k8s secret.
        - mountPath: /license
          name: license-volume
        {{- end }}
        # needed for the license-server create sqlite database
        {{- if eq .Values.database.kind "sqlite" }}
        - mountPath: /opt/mirrord/data
          name: data
        {{- end }}
        - mountPath: /tmp
          name: tmp
        {{- if .Values.saml.enabled }}
        - mountPath: /etc/mirrord-saml
          name: saml-idp-metadata
          readOnly: true
        {{- end }}
      serviceAccountName: {{ .Values.sa.name }}
      volumes:
      {{- if or (index .Values.tls.data "tls.key") .Values.tls.certManager.enabled }}
      - name: tls-volume
        secret:
          secretName: {{ .Values.tls.secret }}
      {{- end }}
      {{- if not .Values.license.gsmRef }}
      # Only when we have the license in a k8s secret.
      - name: license-volume
        secret:
          secretName: {{ .Values.license.file.secret }}
      {{- end }}
      {{- if eq .Values.database.kind "sqlite" }}
      - name: data
        persistentVolumeClaim:
          claimName: mirrord-license-server-pvc
      {{- end }}
      - emptyDir: {}
        name: tmp
      {{- if .Values.saml.enabled }}
      - name: saml-idp-metadata
        configMap:
          name: {{ .Values.saml.idpMetadataConfigMap.name }}
      {{- end }}
