apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    app: mirrord-share-ingress
    {{- include "mirrord-share-ingress.labels" . | nindent 4 }}
  name: mirrord-share-ingress
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mirrord-share-ingress
subjects:
- kind: ServiceAccount
  name: {{ .Values.sa.name }}
  namespace: {{ .Values.namespace }}
