operator:
  spannerBranching: true
  spannerBranchConfig:
    dbPod:
      image:
        registry: "gcr.io/cloud-spanner-emulator/emulator"
      volume:
        name: "spanner-beautiful-data"
        emptyDir:
          sizeLimit: "1Gi"
      labels: { "role": "database" }
      annotations: { "db.branch/owner-team": "platform" }
      resources:
        requests:
          cpu: "500m"
          memory: "512Mi"
        limits:
          cpu: "1"
          memory: "1Gi"

license:
  file:
    secret: mirrord-operator-license
    data:
      license.pem: "DOESN'TNEEDTOBOOTSOITCANBEINVALID"
