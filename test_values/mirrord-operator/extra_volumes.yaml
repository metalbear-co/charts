license:
  file:
    secret: mirrord-operator-license
    data:
      license.pem: "DOESN'TNEEDTOBOOTSOITCANBEINVALID"

operator:
  extraVolumeMounts:
    - name: my-secret
      mountPath: /etc/my-secret
      readOnly: true
  extraVolumes:
    - name: my-secret
      secret:
        secretName: my-secret
