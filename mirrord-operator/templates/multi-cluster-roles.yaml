{{- if or .Values.operator.multiCluster.enabled .Values.operator.multiClusterMember }}
---
# ClusterRole for Envoy (Primary Cluster)
# This role allows the primary operator to manage multi-cluster sessions
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mirrord-operator-envoy
  labels:
    {{- include "mirrord-operator.labels" . | nindent 4 }}
rules:
# Multi-cluster session management
- apiGroups:
  - operator.metalbear.co
  resources:
  - mirrordmulticlustersessions
  verbs:
  - create
  - get
  - list
  - watch
  - update
  - patch
  - delete
- apiGroups:
  - operator.metalbear.co
  resources:
  - mirrordmulticlustersessions/status
  verbs:
  - get
  - update
  - patch
# Access targets for multi-cluster routing
- apiGroups:
  - operator.metalbear.co
  resources:
  - targets
  verbs:
  - get
  - list
  {{- if and .Values.operator.multiClusterMember (not .Values.operator.multiCluster.enabled) }}
  - proxy
  {{- else }}
  - watch
  {{- end }}
# Database branch sync controller - watches branch CRDs on primary,
# syncs to default cluster, syncs status back
- apiGroups:
  - dbs.mirrord.metalbear.co
  resources:
  - pgbranchdatabases
  - mysqlbranchdatabases
  - mongodbbranchdatabases
  - branchdatabases
  verbs:
  - get
  - list
  - watch
  - update
  - patch
  {{- if and .Values.operator.multiClusterMember (not .Values.operator.multiCluster.enabled) }}
  - create
  - delete
  {{- end }}
- apiGroups:
  - dbs.mirrord.metalbear.co
  resources:
  - pgbranchdatabases/status
  - mysqlbranchdatabases/status
  - mongodbbranchdatabases/status
  - branchdatabases/status
  verbs:
  - get
  - update
  - patch
# Preview session sync controller - watches PreviewSession CRs on primary,
# syncs to default cluster, syncs status back
- apiGroups:
  - preview.mirrord.metalbear.co
  resources:
  - previewsessions
  verbs:
  - get
  - list
  - watch
  - update
  - patch
  {{- if and .Values.operator.multiClusterMember (not .Values.operator.multiCluster.enabled) }}
  - create
  - delete
  {{- end }}
- apiGroups:
  - preview.mirrord.metalbear.co
  resources:
  - previewsessions/status
  verbs:
  - get
  - update
  - patch
# The envoy reads the target operator's supported features before connecting
# (to decide whether connect params go in a header). On the primary this is a
# self-read of its own in-cluster operator.
- apiGroups:
  - operator.metalbear.co
  resources:
  - mirrordoperators
  verbs:
  - get
{{- if and .Values.operator.multiClusterMember (not .Values.operator.multiCluster.enabled) }}
# Queue-splitting CRDs synced from primary cluster
- apiGroups:
  - queues.mirrord.metalbear.co
  resources:
  - mirrordworkloadqueueregistries
  - mirrordsplitconfigs
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - mirrord.metalbear.co
  resources:
  - mirrordpropertylists
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
# Token refresh
- apiGroups:
  - ""
  resources:
  - serviceaccounts/token
  verbs:
  - create
# Read pods for session targeting
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
# Read deployments/statefulsets for targeting
- apiGroups:
  - apps
  resources:
  - deployments
  - statefulsets
  - replicasets
  - daemonsets
  verbs:
  - get
  - list
  - watch
# Operator API resources for multi-cluster agent communication
- apiGroups:
  - operator.metalbear.co
  resources:
  - targets
  - copytargets
  - targets/port-locks
  - queuesplits
  verbs:
  - get
  - list
  - proxy
- apiGroups:
  - operator.metalbear.co
  resources:
  - copytargets
  verbs:
  - create
{{- end }}
---
# ClusterRole for cross-cluster Envoy access
# This role is bound to the primary operator's service account in REMOTE clusters
# It allows the primary operator to create cluster sessions (with multi-cluster fields) in remote clusters
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mirrord-operator-envoy-remote
  labels:
    {{- include "mirrord-operator.labels" . | nindent 4 }}
rules:
# The primary reads the remote operator's supported features before connecting,
# to decide whether connect params go in a header instead of the query string.
- apiGroups:
  - operator.metalbear.co
  resources:
  - mirrordoperators
  verbs:
  - get
# `sessions` is the operator's aggregated API, not a stored CRD. When the primary
# serves a cross-cluster session list/kill it fans out to each member's aggregated
# API using that member's credential; without these verbs the member returns a
# forbidden error and the primary silently drops it from the combined view.
- apiGroups:
  - operator.metalbear.co
  resources:
  - sessions
  verbs:
  - get
  - list
  - delete
# Create and manage cluster sessions in remote clusters (reuses existing MirrordClusterSession CRD)
- apiGroups:
  - mirrord.metalbear.co
  resources:
  - mirrordclustersessions
  verbs:
  - create
  - get
  - list
  - watch
  - delete
- apiGroups:
  - mirrord.metalbear.co
  resources:
  - mirrordclustersessions/status
  verbs:
  - get
  - watch
# Copy target pod lifecycle on the default (workload) cluster.
# Mirrors the single-cluster operator permissions for pod management.
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - create
  - delete
  - patch
# Target resolution needs to read services, rollouts, and pod templates
# in addition to pods/deployments/statefulsets already in the envoy role.
- apiGroups:
  - ""
  resources:
  - services
  - podtemplates
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - argoproj.io
  resources:
  - rollouts
  verbs:
  - get
  - list
  - watch
# Create workload patch requests for multi-cluster copy target scale-down.
# Cleanup is handled via K8s garbage collection (owned by the child session).
- apiGroups:
  - mirrord.metalbear.co
  resources:
  - mirrordclusterworkloadpatchrequests
  verbs:
  - create
{{- if or .Values.operator.pgBranching .Values.operator.mysqlBranching .Values.operator.dynamodbBranching .Values.operator.mongodbBranching .Values.operator.mssqlBranching .Values.operator.redisBranching .Values.operator.spannerBranching .Values.operator.clickhouseBranching .Values.operator.genericBranching }}
# The primary operator creates credential Secrets on the default cluster
# when the mirrord config contains literal connection values.
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - create
{{- end }}
{{- if .Values.operator.sqsSplitting }}
# SQS session management for copy target + SQS splitting.
# The primary operator creates SQS sessions directly on the default cluster.
- apiGroups:
  - queues.mirrord.metalbear.co
  resources:
  - mirrordsqssessions
  verbs:
  - create
  - get
  - list
  - watch
  - delete
  - patch
- apiGroups:
  - queues.mirrord.metalbear.co
  resources:
  - mirrordsqssessions/status
  verbs:
  - get
  - update
  - patch
{{- end }}
{{- if or .Values.operator.gcpPubsubSplitting .Values.operator.azureServiceBusSplitting .Values.operator.temporalSplitting .Values.operator.bullmqSplitting .Values.operator.redisPubsubSplitting .Values.operator.sqsSplitting .Values.operator.kafkaSplitting .Values.operator.rmqSplitting}}
# The envoy watches MirrordClusterSplitSession on the default cluster to
# collect tmpResources before connecting to non-default clusters.
- apiGroups:
  - queues.mirrord.metalbear.co
  resources:
  - mirrordclustersplitsessions
  verbs:
  - create
  - get
  - list
  - watch
  - update
  - delete
  - patch
- apiGroups:
  - queues.mirrord.metalbear.co
  resources:
  - mirrordclustersplitsessions/status
  verbs:
  - get
  - update
  - patch
{{- end }}
{{- if not (or .Values.operator.multiClusterMemberIamGroup .Values.operator.multiClusterMemberAzureGroup) }}
---
# ClusterRoleBinding to bind mirrord-operator-envoy to the operator ServiceAccount
# This allows the operator to manage multi-cluster sessions
# Not created when using IAM or `AKS` auth (group-based bindings are used instead)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mirrord-operator-envoy
  labels:
    {{- include "mirrord-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mirrord-operator-envoy
subjects:
  - kind: ServiceAccount
    {{- if and .Values.operator.multiClusterMember (not .Values.operator.multiCluster.enabled) }}
    name: mirrord-operator-envoy
    {{- else }}
    name: {{ .Values.sa.name }}
    {{- end }}
    namespace: {{ .Values.namespace }}
{{- if and .Values.operator.multiClusterMember (not .Values.operator.multiCluster.enabled) }}
---
# ClusterRoleBinding for mirrord-operator-envoy-remote — allows the primary operator's
# ServiceAccount to create/manage child MirrordClusterSessions on this remote cluster.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mirrord-operator-envoy-remote
  labels:
    {{- include "mirrord-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mirrord-operator-envoy-remote
subjects:
  - kind: ServiceAccount
    name: mirrord-operator-envoy
    namespace: {{ .Values.namespace }}
{{- end }}
{{- end }}
{{- if .Values.operator.multiClusterMemberIamGroup }}
---
# ClusterRoleBinding for IAM auth — binds the Kubernetes group (from EKS Access Entry)
# to the same ClusterRole as the ServiceAccount-based setup.
# The group name must match --kubernetes-groups in the EKS Access Entry.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mirrord-operator-envoy-iam
  labels:
    {{- include "mirrord-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mirrord-operator-envoy
subjects:
  - kind: Group
    name: {{ .Values.operator.multiClusterMemberIamGroup }}
    apiGroup: rbac.authorization.k8s.io
---
# ClusterRoleBinding for IAM auth — binds the Kubernetes group to the remote role
# so the primary operator can create child sessions via IAM identity
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mirrord-operator-envoy-remote-iam
  labels:
    {{- include "mirrord-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mirrord-operator-envoy-remote
subjects:
  - kind: Group
    name: {{ .Values.operator.multiClusterMemberIamGroup }}
    apiGroup: rbac.authorization.k8s.io
{{- end }}
{{- if .Values.operator.multiClusterMemberAzureGroup }}
---
# ClusterRoleBinding for AKS Workload Identity — binds the Azure AD group/identity
# to the same ClusterRole as the ServiceAccount-based setup.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mirrord-operator-envoy-azure
  labels:
    {{- include "mirrord-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mirrord-operator-envoy
subjects:
  - kind: Group
    name: {{ .Values.operator.multiClusterMemberAzureGroup }}
    apiGroup: rbac.authorization.k8s.io
---
# ClusterRoleBinding for AKS Workload Identity — binds the Azure AD group/identity
# to the remote role so the primary operator can create child sessions
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mirrord-operator-envoy-remote-azure
  labels:
    {{- include "mirrord-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mirrord-operator-envoy-remote
subjects:
  - kind: Group
    name: {{ .Values.operator.multiClusterMemberAzureGroup }}
    apiGroup: rbac.authorization.k8s.io
{{- end }}
{{- end }}

