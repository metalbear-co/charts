{{- include "mirrord-operator.validateLicense" . }}
{{- include "mirrord-operator.validateCloudApiKey" . }}
{{- $pemGsmRef := coalesce .Values.license.pemGsmRef .Values.license.gsmRef }}
{{- $cloudApiKey := (.Values.cloud | default dict).apiKey | default dict }}
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: mirrord-operator
    component: operator
    app.kubernetes.io/component: operator
    {{- include "mirrord-operator.labels" . | nindent 4 }}
  name: mirrord-operator
  namespace: {{ .Values.namespace }}
spec:
  selector:
    matchLabels:
      app: mirrord-operator
  replicas: {{ .Values.operator.replicas }}
  template:
    metadata:
      labels:
        {{- include "mirrord-operator.labels" . | nindent 8 }}
        app: mirrord-operator
        component: operator
        app.kubernetes.io/component: operator
        {{- if .Values.sa.azureClientId }}
        azure.workload.identity/use: "true"
        {{- end }}
        {{- if .Values.operator.podLabels }}
          {{- toYaml .Values.operator.podLabels | nindent 8 }}
        {{- end }}
      annotations:
        {{- if .Values.operator.podAnnotations }}
          {{- toYaml .Values.operator.podAnnotations | nindent 8 }}
        {{- end }}
    spec:
      {{- if .Values.operator.imagePullSecrets }}
      imagePullSecrets:
        {{- range .Values.operator.imagePullSecrets }}
        - {{ toYaml . }}
        {{- end }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        {{/* Allow low port using ip_unprivileged_port_start */}}
        {{- if lt (int .Values.operator.port) 1024 -}}
        sysctls:
        - name: net.ipv4.ip_unprivileged_port_start
          value: {{ .Values.operator.port | quote}}
        {{- end }}
      {{- if .Values.operator.tolerations }}
      tolerations:
        {{- toYaml .Values.operator.tolerations | nindent 8 }}
      {{- end }}
      {{- with .Values.operator.nodeSelector }}
      nodeSelector:
        {{- toYaml . | trim | nindent 8 }}
      {{- end }}
      {{- with .Values.operator.affinity }}
      affinity:
        {{- toYaml . | trim | nindent 8 }}
      {{- end }}
      containers:
      - env:
        {{- /*
        We set AWS_ROLE_SESSION_NAME because Kafka SASL on MSK expects it to be static.
        If pod identity is set, the session name generated can change during the session leading to "Cannot change principals during re-authentication"
        https://github.com/tulios/kafkajs/issues/1582
        */}}
        - name: AWS_ROLE_SESSION_NAME
          value: mirrord-operator
        - name: RUST_LOG
          value: {{ .Values.operator.logLevel }}
        {{- if .Values.operator.otelLogLevel }}
        - name: OTLP_RUST_LOG
          value: {{ .Values.operator.otelLogLevel }}
        {{- end }}
        - name: OPERATOR_ADDR
          value: {{ printf "[::]:%d" (int .Values.operator.port ) | quote }}
        - name: OPERATOR_FALLBACK_ADDR
          value: {{ printf "0.0.0.0:%d" (int .Values.operator.port ) | quote }}
        - name: OPERATOR_POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: OPERATOR_POD_UID
          valueFrom:
            fieldRef:
              fieldPath: metadata.uid
        - name: MIRRORD_OPERATOR_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: OPERATOR_SERVICE_NAME
          value: mirrord-operator
        - name: OPERATOR_TELEMETRY_ENABLED
          value: {{ .Values.operator.disableTelemetries | ternary "false" "true" | quote }}
        {{ if .Values.operator.maxSessionTimeSeconds }}
        - name: OPERATOR_MAX_SESSION_TIME_SECONDS
          value: {{ .Values.operator.maxSessionTimeSeconds | quote }}
        {{- end }}
        {{- if .Values.operator.subscribeEventBufferSize }}
        - name: OPERATOR_EVENT_BUFFER_SIZE
          value: {{ .Values.operator.subscribeEventBufferSize | quote }}
        {{- end }}
        - name: OPERATOR_SQS_SPLITTING
          value: {{ include "mirrord-operator.checked-bool-ternary" .Values.operator.sqsSplitting }}
        - name: OPERATOR_RMQ_SPLITTING
          value: {{ include "mirrord-operator.checked-bool-ternary" .Values.operator.rmqSplitting }}
        - name: OPERATOR_KAFKA_SPLITTING
          value: {{ include "mirrord-operator.checked-bool-ternary" .Values.operator.kafkaSplitting }}
        - name: OPERATOR_GCP_PUBSUB_SPLITTING
          value: {{ include "mirrord-operator.checked-bool-ternary" .Values.operator.gcpPubsubSplitting }}
        - name: OPERATOR_AZURE_SERVICE_BUS_SPLITTING
          value: {{ include "mirrord-operator.checked-bool-ternary" .Values.operator.azureServiceBusSplitting }}
        - name: OPERATOR_REDIS_PUBSUB_SPLITTING
          value: {{ include "mirrord-operator.checked-bool-ternary" .Values.operator.redisPubsubSplitting }}
        - name: OPERATOR_TEMPORAL_SPLITTING
          value: {{ include "mirrord-operator.checked-bool-ternary" .Values.operator.temporalSplitting }}
        - name: OPERATOR_BULLMQ_SPLITTING
          value: {{ include "mirrord-operator.checked-bool-ternary" .Values.operator.bullmqSplitting }}
        - name: OPERATOR_TEMPORAL_PROXY_PORT
          value: {{ .Values.operator.temporalProxy.port | quote }}
        - name: OPERATOR_MYSQL_BRANCHING
          value: {{ include "mirrord-operator.checked-bool-ternary" .Values.operator.mysqlBranching }}
        - name: OPERATOR_MARIADB_BRANCHING
          value: {{ include "mirrord-operator.checked-bool-ternary" .Values.operator.mariadbBranching }}
        - name: OPERATOR_PG_BRANCHING
          value: {{ include "mirrord-operator.checked-bool-ternary" .Values.operator.pgBranching }}
        - name: OPERATOR_MONGODB_BRANCHING
          value: {{ include "mirrord-operator.checked-bool-ternary" .Values.operator.mongodbBranching }}
        - name: OPERATOR_DYNAMODB_BRANCHING
          value: {{ include "mirrord-operator.checked-bool-ternary" .Values.operator.dynamodbBranching }}
        - name: OPERATOR_MSSQL_BRANCHING
          value: {{ include "mirrord-operator.checked-bool-ternary" .Values.operator.mssqlBranching }}
        - name: OPERATOR_REDIS_BRANCHING
          value: {{ include "mirrord-operator.checked-bool-ternary" .Values.operator.redisBranching }}
        - name: OPERATOR_SPANNER_BRANCHING
          value: {{ include "mirrord-operator.checked-bool-ternary" .Values.operator.spannerBranching }}
        - name: OPERATOR_CLICKHOUSE_BRANCHING
          value: {{ include "mirrord-operator.checked-bool-ternary" .Values.operator.clickhouseBranching }}
        - name: OPERATOR_COCKROACHDB_BRANCHING
          value: {{ include "mirrord-operator.checked-bool-ternary" .Values.operator.cockroachdbBranching }}
        - name: OPERATOR_GENERIC_BRANCHING
          value: {{ include "mirrord-operator.checked-bool-ternary" .Values.operator.genericBranching }}
        - name: OPERATOR_PREVIEW_ENV
          value: {{ include "mirrord-operator.checked-bool-ternary" .Values.operator.previewEnv }}
        {{- if and .Values.operator.shareIngress .Values.operator.shareIngress.shareDomain }}
        - name: OPERATOR_SHARE_INGRESS_SHARE_DOMAIN
          value: {{ .Values.operator.shareIngress.shareDomain | quote }}
        {{- end }}
        {{- if and .Values.operator.dbBranching .Values.operator.dbBranching.initPodVolumeLimit }}
        - name: OPERATOR_BRANCH_DEFAULT_INIT_VOLUME_SIZE_LIMIT
          value: {{ .Values.operator.dbBranching.initPodVolumeLimit | quote }}
        {{- end }}
        {{- if and .Values.operator.dbBranching .Values.operator.dbBranching.databasePodVolumeLimit }}
        - name: OPERATOR_BRANCH_DEFAULT_DB_VOLUME_SIZE_LIMIT
          value: {{ .Values.operator.dbBranching.databasePodVolumeLimit | quote }}
        {{- end }}
        {{- if .Values.operator.applicationPauseAutoSync }}
        - name: OPERATOR_APPLICATION_PAUSE_AUTO_SYNC
          value: "true"
        {{- end }}
        {{- if .Values.operator.suspendFluxControllers }}
        - name: OPERATOR_SUSPEND_FLUX_CONTROLLERS
          value: "true"
        {{- end }}
        - name: OPERATOR_METRICS_ENABLED
          value: {{ include "mirrord-operator.checked-bool-ternary" .Values.operator.metrics }}
        {{- if .Values.operator.metrics }}
        - name: OPERATOR_METRICS_ADDR
          value: "[::]:9000"
        - name: OPERATOR_METRICS_FALLBACK_ADDR
          value: "0.0.0.0:9000"
        {{- end }}
        - name: OPERATOR_JSON_LOG
          value: {{ include "mirrord-operator.checked-bool-ternary" .Values.operator.jsonLog }}
        - name: OPERATOR_REQUIRE_FRONT_PROXY_CLIENT_CERT
          value: {{ include "mirrord-operator.checked-bool-ternary" .Values.operator.requireFrontProxyClientCert }}
        - name: OPERATOR_AGENT_CONFIG
          value: /mirrord-config/agent-config.yaml
        - name: OPERATOR_MYSQL_BRANCH_CONFIG
          value: /mirrord-config/mysql-branch-config.yaml
        - name: OPERATOR_MARIADB_BRANCH_CONFIG
          value: /mirrord-config/mariadb-branch-config.yaml
        - name: OPERATOR_PG_BRANCH_CONFIG
          value: /mirrord-config/pg-branch-config.yaml
        - name: OPERATOR_MONGODB_BRANCH_CONFIG
          value: /mirrord-config/mongodb-branch-config.yaml
        - name: OPERATOR_DYNAMODB_BRANCH_CONFIG
          value: /mirrord-config/dynamodb-branch-config.yaml
        - name: OPERATOR_PREVIEW_CONFIG
          value: /mirrord-config/preview-config.yaml
        - name: OPERATOR_MSSQL_BRANCH_CONFIG
          value: /mirrord-config/mssql-branch-config.yaml
        - name: OPERATOR_REDIS_BRANCH_CONFIG
          value: /mirrord-config/redis-branch-config.yaml
        - name: OPERATOR_SPANNER_BRANCH_CONFIG
          value: /mirrord-config/spanner-branch-config.yaml
        - name: OPERATOR_CLICKHOUSE_BRANCH_CONFIG
          value: /mirrord-config/clickhouse-branch-config.yaml
        - name: OPERATOR_COCKROACHDB_BRANCH_CONFIG
          value: /mirrord-config/cockroachdb-branch-config.yaml
        - name: OPERATOR_GENERIC_BRANCH_CONFIG
          value: /mirrord-config/generic-branch-config.yaml
        {{- if or (index .Values.tls.data "tls.key") .Values.tls.certManager.enabled .Values.tls.useExistingSecret }}
        - name: OPERATOR_TLS_CERT_PATH
          value: /tls/tls.crt
        - name: OPERATOR_TLS_KEY_PATH
          value: /tls/tls.key
        {{- end }}
        {{- if .Values.agent.tls }}
        - name: OPERATOR_AGENT_CONNECTION_TLS
          value: "true"
        {{- end }}
        {{- if .Values.agent.port }}
        - name: OPERATOR_AGENT_PORT
          value: {{ .Values.agent.port | quote }}
        {{- end }}
        {{- if .Values.operator.noPodTargetsSessionTimeoutMillis }}
        - name: OPERATOR_NO_POD_TARGETS_SESSION_TIMEOUT_MILLIS
          value: {{ .Values.operator.noPodTargetsSessionTimeoutMillis | quote }}
        {{- end }}
        {{- if .Values.operator.idleKafkaSplitTtlMillis}}
        - name: OPERATOR_KAFKA_SPLITTING_TTL
          value: {{ .Values.operator.idleKafkaSplitTtlMillis | quote }}
        {{- end }}
        {{- if .Values.operator.kafkaSplittingTopicFormat }}
        - name: OPERATOR_KAFKA_SPLITTING_TOPIC_FORMAT
          value: {{ .Values.operator.kafkaSplittingTopicFormat | quote }}
        {{- end }}
        - name: OPERATOR_COPY_TARGET_USE_AGENT_IMAGE
          value: {{ include "mirrord-operator.checked-bool-ternary" .Values.operator.copyTarget.useAgentImage }}
        {{- if .Values.license.licenseServer }}
        - name: OPERATOR_LICENSE_SERVER
          value: {{ .Values.license.licenseServer | quote }}
        {{- end }}
        - name: OPERATOR_LICENSE_ALLOW_SEAT_OVERAGES
          value: {{ include "mirrord-operator.checked-bool-ternary" .Values.license.allowSeatOverages }}
        {{- if .Values.operator.jiraWebhookUrl }}
        - name: OPERATOR_JIRA_WEBHOOK_URL
          value: {{ .Values.operator.jiraWebhookUrl | quote }}
        {{- end }}
        {{- if .Values.operator.clusterName }}
        - name: OPERATOR_CLUSTER_NAME
          value: {{ .Values.operator.clusterName | quote }}
        {{- end }}
        - name: OPERATOR_MUTATING_WEBHOOKS
          value: "true"
        - name: OPERATOR_ISOLATE_PODS_RESTART
          value: {{ include "mirrord-operator.checked-bool-ternary" .Values.operator.isolatePodsRestart }}
        {{- if .Values.operator.injectSessionKeyHeader }}
        - name: OPERATOR_INJECT_SESSION_KEY_HEADER
          value: "true"
        {{- end }}
        {{- if .Values.operator.sqsSplittingLingerTimeout }}
        - name: OPERATOR_SQS_SPLITTING_LINGER_TIMEOUT
          value: {{ .Values.operator.sqsSplittingLingerTimeout | quote }}
        {{- end }}
        - name: OPERATOR_QUEUE_SPLITTING_WAIT_FOR_READY_TARGET
          value: {{ include "mirrord-operator.checked-bool-ternary" .Values.operator.queueSplittingWaitForReadyTarget }}
        - name: OPERATOR_IMAGE
          value: {{ .Values.operator.image }}:{{ default .Chart.AppVersion .Values.operator.imageTag }}
        - name: OPERATOR_IMAGE_PULL_POLICY
          value: {{ default "IfNotPresent" .Values.operator.imagePullPolicy }}
        {{- if .Values.agent.extraEnv }}
        - name: OPERATOR_AGENT_EXTRA_ENV
          value: {{ .Values.agent.extraEnv | toJson | quote }}
        {{- end }}
        {{- if and .Values.operator.kafkaSplitting .Values.operator.kafkaSplittingSidecar.enabled }}
        - name: OPERATOR_KAFKA_SPLITTING_SIDECAR_PORT
          value: {{ .Values.operator.kafkaSplittingSidecar.port | quote }}
        {{- end }}
        {{- if .Values.operator.multiCluster.enabled }}
        # Multi-cluster configuration - read from mounted ConfigMap
        - name: MIRRORD_MULTICLUSTER_CONFIG
          value: /mirrord-config/multicluster-config.yaml
        {{- if .Values.operator.multiCluster.clusters }}
        - name: MIRRORD_CLUSTERS_CONFIG
          value: /mirrord-config/clusters-config.yaml
        {{- end }}
        {{- end }}
        {{- range $key, $val := .Values.operator.extraEnv }}
        - name: {{ $key }}
        {{- if kindIs "map" $val }}
{{- toYaml $val | nindent 10 }}
        {{- else }}
          value: {{ $val | quote }}
        {{- end }}
        {{- end }}
        {{- /*
        OTEL export URLs are set _after_ extraEnv, so that the urls can reference env vars, for
        example: `otelLogExportUrl: "http://$(HOST_IP):$(OTLP_PORT)"`
        */}}
        {{- if .Values.operator.otelLogExportUrl }}
        - name: OTLP_LOGS_URL
          value: {{ .Values.operator.otelLogExportUrl }}
        {{- end }}
        {{- if .Values.operator.otelTraceExportUrl }}
        - name: OTLP_TRACES_URL
          value: {{ .Values.operator.otelTraceExportUrl }}
        {{- end }}
        {{- if $pemGsmRef }}
        - name: OPERATOR_LICENSE_GSM_REF
          value: {{ $pemGsmRef | quote }}
        {{- end }}
        {{- if .Values.license.keyGsmRef }}
        - name: OPERATOR_LICENSE_KEY_GSM_REF
          value: {{ .Values.license.keyGsmRef | quote }}
        {{- end }}
        {{- if or .Values.license.file.data .Values.license.pemRef }}
        - name: OPERATOR_LICENSE_PATH
          value: /license/license.pem
        {{- end }}
        {{- if $cloudApiKey.key }}
        - name: OPERATOR_CLOUD_API_KEY
          value: {{ $cloudApiKey.key | quote }}
        {{- else if $cloudApiKey.keyRef }}
        - name: OPERATOR_CLOUD_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ $cloudApiKey.keyRef }}
              key: apiKey
        {{- else if $cloudApiKey.gsmRef }}
        - name: OPERATOR_CLOUD_API_KEY_GSM_REF
          value: {{ $cloudApiKey.gsmRef | quote }}
        {{- end }}
        {{- if .Values.license.key }}
        envFrom:
        - secretRef:
            name: {{ .Values.license.file.secret }}
        {{- else if .Values.license.keyRef }}
        envFrom:
        - secretRef:
            name: {{ .Values.license.keyRef }}
        {{- end }}
        image: {{ .Values.operator.image }}:{{ default .Chart.AppVersion .Values.operator.imageTag }}
        imagePullPolicy: {{ default "IfNotPresent" .Values.operator.imagePullPolicy }}
        {{- if .Values.operator.containerArgs }}
        args:
          {{- range .Values.operator.containerArgs }}
          - {{ toYaml . }}
          {{- end }}
        {{- end }}
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.operator.port }}
            scheme: HTTPS
          periodSeconds: 5
          timeoutSeconds: 10
          failureThreshold: 30
        name: mirrord-operator
        ports:
        - containerPort: {{ .Values.operator.port }}
          name: https
        {{- if .Values.operator.temporalSplitting }}
        - containerPort: {{ .Values.operator.temporalProxy.port }}
          name: temporal
        {{- end }}
        {{- if .Values.operator.metrics }}
        - containerPort: 9000
          name: metrics
        {{- end }}
        readinessProbe:
          httpGet:
            path: /health
            port: {{ .Values.operator.port }}
            scheme: HTTPS
          periodSeconds: 5
        resources:
          requests:
            cpu: {{ .Values.operator.requests.cpu }}
            memory: {{ .Values.operator.requests.memory }}
          limits:
            cpu: {{ .Values.operator.limits.cpu }}
            memory: {{ .Values.operator.limits.memory }}
        securityContext:
          runAsNonRoot: true
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          privileged: false
        volumeMounts:
        {{- if or (index .Values.tls.data "tls.key") .Values.tls.certManager.enabled .Values.tls.useExistingSecret }}
        - mountPath: /tls
          name: tls-volume
        {{- end }}
        - mountPath: /mirrord-config
          name: mirrord-config-volume
        {{- if or .Values.license.file.data .Values.license.pemRef }}
        - mountPath: /license
          name: license-volume
        {{- end }}
        {{- with .Values.operator.extraVolumeMounts }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
        # needed for the operator to download and use CA
        - mountPath: /tmp
          name: tmp

      # Kafka splitting sidecar
      {{- if and .Values.operator.kafkaSplitting .Values.operator.kafkaSplittingSidecar.enabled }}
      - name: kafka-sidecar
        env:
          - name: HTTP_PORT
            value: {{ .Values.operator.kafkaSplittingSidecar.port | quote }}
        image: {{ .Values.operator.kafkaSplittingSidecar.image }}:{{ default .Chart.AppVersion .Values.operator.imageTag }}
        imagePullPolicy: {{ default "IfNotPresent" .Values.operator.imagePullPolicy }}
        resources:
          requests:
            cpu: {{ .Values.operator.kafkaSplittingSidecar.requests.cpu }}
            memory: {{ .Values.operator.kafkaSplittingSidecar.requests.memory }}
          limits:
            cpu: {{ .Values.operator.kafkaSplittingSidecar.limits.cpu }}
            memory: {{ .Values.operator.kafkaSplittingSidecar.limits.memory }}
        securityContext:
          runAsNonRoot: true
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          privileged: false
      {{- end }}
      # End of Kafka splitting sidecar

      serviceAccountName: {{ .Values.sa.name }}
      volumes:
      - name: mirrord-config-volume
        configMap:
          name: mirrord-configmap
      {{- if or (index .Values.tls.data "tls.key") .Values.tls.certManager.enabled .Values.tls.useExistingSecret }}
      - name: tls-volume
        secret:
          secretName: {{ .Values.tls.secret }}
      {{- end }}
      {{- if .Values.license.file.data }}
      - name: license-volume
        secret:
          secretName: {{ .Values.license.file.secret }}
      {{- end }}
      {{- if .Values.license.pemRef }}
      - name: license-volume
        secret:
          secretName: {{ .Values.license.pemRef }}
      {{- end }}
      {{- with .Values.operator.extraVolumes }}
        {{- toYaml . | nindent 6 }}
      {{- end }}
      - emptyDir: {}
        name: tmp
