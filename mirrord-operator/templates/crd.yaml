kind: CustomResourceDefinition
metadata:
  name: mirrordclustersessions.mirrord.metalbear.co
spec:
  group: mirrord.metalbear.co
  names:
    kind: MirrordClusterSession
    plural: mirrordclustersessions
    singular: mirrordclustersession
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - description: User unique ID..
      jsonPath: .spec.owner.userId
      name: USER ID
      type: string
    - description: User local POSIX name.
      jsonPath: .spec.owner.username
      name: USERNAME
      type: string
    - description: User hostname.
      jsonPath: .spec.owner.hostname
      name: HOSTNAME
      type: string
    - description: User Kubernetes name.
      jsonPath: .spec.owner.k8sUsername
      name: K8S USER
      type: string
    - description: Namespace of the session.
      jsonPath: .spec.namespace
      name: NAMESPACE
      type: string
    - description: Target of the session.
      jsonPath: .spec.target
      name: TARGET
      type: string
    - description: Time when the session was started.
      jsonPath: .metadata.creationTimestamp
      name: STARTED AT
      type: date
    - description: Time when the session was closed.
      jsonPath: .metadata.deletionTimestamp
      name: CLOSED AT
      type: date
    - description: Reason for which the session was closed.
      jsonPath: .status.closed.reason
      name: CLOSE REASON
      type: string
    name: v1alpha
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for MirrordClusterSessionSpec via `CustomResource`
        properties:
          spec:
            properties:
              ciInfo:
                description: CI info when a session is started with `mirrord ci start`.
                nullable: true
                properties:
                  environment:
                    description: Staging, production, test, nightly, ...
                    nullable: true
                    type: string
                  pipeline:
                    description: Pipeline/job name, e.g. "e2e-tests".
                    nullable: true
                    type: string
                  provider:
                    description: CI provider, e.g. "github", "gitlab", ...
                    nullable: true
                    type: string
                  triggeredBy:
                    description: PR, manual, push, ...
                    nullable: true
                    type: string
                type: object
              clientCliVersion:
                description: Version of the user's CLI, as reported in the `x-mirrord-cli-version` header.
                nullable: true
                type: string
              copyTarget:
                description: |-
                  Copy target configuration for this session.

                  Set when the session uses a copied pod.
                nullable: true
                properties:
                  scaledown:
                    description: Whether the original target should be scaled down.
                    type: boolean
                required:
                - scaledown
                type: object
              httpFilter:
                nullable: true
                properties:
                  headerFilter:
                    nullable: true
                    type: string
                type: object
              jiraMetrics:
                description: Resources needed to report session metrics to the mirrord Jira app.
                nullable: true
                properties:
                  branchName:
                    description: The user's current git branch.
                    type: string
                required:
                - branchName
                type: object
              key:
                nullable: true
                type: string
              multiClusterParentName:
                description: |-
                  Multi-cluster: name of the parent MirrordMultiClusterSession.

                  When set, this is a child session created by the Primary operator
                  as part of a multi-cluster session. The parent session coordinates
                  all child sessions across clusters.
                nullable: true
                type: string
              namespace:
                description: Kubernetes namespace of the session.
                type: string
              owner:
                description: Owner of this session
                properties:
                  hostname:
                    description: Hostname of the machine where the CLI command was executed.
                    type: string
                  k8sUsername:
                    description: Name of the Kubernetes user who's identity was assumed by the CLI.
                    type: string
                  userId:
                    description: Unique ID.
                    type: string
                  username:
                    description: Name of the POSIX user that executed the CLI command.
                    type: string
                required:
                - hostname
                - k8sUsername
                - userId
                - username
                type: object
              target:
                description: |-
                  Target of the session.

                  None for targetless sessions.
                nullable: true
                properties:
                  apiVersion:
                    description: Kubernetes resource apiVersion.
                    type: string
                  container:
                    description: Name of the container defined in the Pod spec.
                    type: string
                  kind:
                    description: Kubernetes resource kind.
                    type: string
                  name:
                    description: Kubernetes resource name.
                    type: string
                required:
                - apiVersion
                - container
                - kind
                - name
                type: object
            required:
            - namespace
            - owner
            type: object
          status:
            description: Status of a mirrord session.
            nullable: true
            properties:
              closed:
                description: If the session has been closed, describes the reason.
                nullable: true
                properties:
                  message:
                    description: Optional human friendly message.
                    nullable: true
                    type: string
                  reason:
                    description: Short reason in PascalCase.
                    type: string
                required:
                - reason
                type: object
              connectedTimestamp:
                description: Last time when the session was observed to have an open user connection.
                format: date-time
                nullable: true
                type: string
              copyTarget:
                description: Copy target status for sessions using a copied pod.
                nullable: true
                properties:
                  copiedPodStatus:
                    description: |-
                      Status of the produced copied pod.

                      `None` if there is no valid pod at the moment.
                    nullable: true
                    properties:
                      name:
                        description: Name of the copied pod.
                        type: string
                      namespace:
                        description: Namespace of the copied pod.
                        type: string
                      targetContainer:
                        description: Name of the target container in the copied pod.
                        type: string
                    required:
                    - name
                    - namespace
                    - targetContainer
                    type: object
                  name:
                    description: Name of the CopyTargetCrd, used by CLI when making connections.
                    type: string
                required:
                - name
                type: object
            type: object
        required:
        - spec
        title: MirrordClusterSession
        type: object
    served: true
    storage: true
    subresources:
      status: {}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: mirrordclusterexternalresources.mirrord.metalbear.co
spec:
  group: mirrord.metalbear.co
  names:
    kind: MirrordClusterExternalResource
    plural: mirrordclusterexternalresources
    singular: mirrordclusterexternalresource
  scope: Cluster
  versions:
  - name: v1alpha
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for MirrordClusterExternalResourceSpec via `CustomResource`
        properties:
          spec:
            description: |-
              Generic external resource created by the operator.

              For future compatibility and to avoid any schema issues, every resource type is represented in a
              separate optional field.
            properties:
              azureServiceBusResource:
                description: |-
                  Temporary Azure Service Bus resource (queue, topic, or subscription) created for
                  queue splitting.
                nullable: true
                properties:
                  kind:
                    enum:
                    - queue
                    - topic
                    - subscription
                    - unknown
                    type: string
                  name:
                    description: |-
                      Identifies the resource the operator must clean up.

                      For a queue or topic this is just the entity name. For a subscription or
                      a subscription rule it is the full Service Bus entity path (for example
                      `my-topic/subscriptions/mirrord-ingest-1a2b`), because deleting a
                      subscription or editing its rules through the REST API needs the parent
                      topic in the URL. Encoding the path here keeps the cleanup self-contained
                      without adding more fields to the CRD.
                    type: string
                  propertiesListName:
                    description: Name of the `MirrordPropertyList` with connection_string for cleanup.
                    type: string
                  propertiesListNamespace:
                    description: Namespace of the `MirrordPropertyList`.
                    type: string
                required:
                - kind
                - name
                - propertiesListName
                - propertiesListNamespace
                type: object
              gcpPubsubResource:
                description: |-
                  Temporary Google Cloud Pub/Sub resource (topic or subscription) created for queue
                  splitting.
