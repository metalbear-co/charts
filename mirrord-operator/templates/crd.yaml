kind: CustomResourceDefinition
metadata:
  name: pgbranchdatabases.dbs.mirrord.metalbear.co
spec:
  group: dbs.mirrord.metalbear.co
  names:
    kind: PgBranchDatabase
    plural: pgbranchdatabases
    singular: pgbranchdatabase
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for PgBranchDatabaseSpec via `CustomResource`
        properties:
          spec:
            properties:
              connectionSource:
                description: Database connection info from the workload.
                oneOf:
                - required:
                  - url
                - required:
                  - params
                properties:
                  params:
                    description: Individual connection parameters (host, port, user, password, database).
                    properties:
                      database:
                        x-kubernetes-preserve-unknown-fields: true
                      extra:
                        additionalProperties:
                          x-kubernetes-preserve-unknown-fields: true
                        description: |-
                          Engine-specific connection params keyed by name (e.g. Spanner `project` / `instance`).
                          Resolved through the same source machinery as the fixed slots; each entry becomes a
                          `--src-db-param <name>=<ref>` arg for the init binary. The accepted key set is owned by
                          the engine (see `ExtraParamSet`) and validated per dialect, so unknown keys are rejected.
                        type: object
                      host:
                        x-kubernetes-preserve-unknown-fields: true
                      password:
                        x-kubernetes-preserve-unknown-fields: true
                      port:
                        x-kubernetes-preserve-unknown-fields: true
                      user:
                        x-kubernetes-preserve-unknown-fields: true
                    type: object
                  url:
                    description: One or more complete connection URL sources.
                    x-kubernetes-preserve-unknown-fields: true
                type: object
              copy:
                default:
                  mode: empty
                description: Options for copying data from source database to the branch.
                properties:
                  mode:
                    description: The default copy mode for the branch.
                    enum:
                    - empty
                    - schema
                    - all
                    type: string
                  tables:
                    additionalProperties:
                      properties:
                        filter:
                          description: |-
                            Data that matches the filter will be copied.
                            For PostgreSQL, this filter is a `WHERE` clause that looks like `username = 'alice'`.
                          nullable: true
                          type: string
                      type: object
                    description: |-
                      An optional list of tables whose schema and data will be copied based on their
                      table level copy config. Only compatible with `Empty` and `Schema` copy mode.
                    nullable: true
                    type: object
                required:
                - mode
                type: object
              databaseName:
                description: PostgreSQL database name.
                nullable: true
                type: string
              iamAuth:
                description: |-
                  IAM authentication configuration for the source database.
                  Use this when the source database (RDS, Cloud SQL) requires IAM auth instead of passwords.
                nullable: true
                properties:
                  type:
                    enum:
                    - aws_rds
                    - gcp_cloud_sql
                    type: string
                required:
                - type
                type: object
                x-kubernetes-preserve-unknown-fields: true
              id:
                description: ID derived by mirrord CLI.
                type: string
              postgresVersion:
                description: PostgreSQL server image version, e.g. "16".
                nullable: true
                type: string
              target:
                description: Target k8s resource to extract connection source info from.
                enum:
                - targetless
                oneOf:
                - required:
                  - deployment
                - required:
                  - pod
                - required:
                  - rollout
                - required:
                  - job
                - required:
                  - cron_job
                - required:
                  - stateful_set
                - required:
                  - service
                - required:
                  - replica_set
                properties:
                  container:
                    nullable: true
                    type: string
                  cron_job:
                    type: string
                  deployment:
                    description: |-
                      <!--${internal}-->
                      Deployment to mirror.
                    type: string
                  job:
                    type: string
                  pod:
                    description: |-
                      <!--${internal}-->
                      Pod to mirror.
                    type: string
                  replica_set:
                    type: string
                  rollout:
                    description: |-
                      <!--${internal}-->
                      Rollout to mirror.
                    type: string
                  service:
                    type: string
                  stateful_set:
                    type: string
                type: object
              ttlSecs:
                description: The duration in seconds this branch database will live idling.
                format: uint64
                minimum: 0.0
                type: integer
            required:
            - connectionSource
            - id
            - target
            - ttlSecs
            type: object
          status:
            nullable: true
            properties:
              error:
                description: Error message when phase is Failed.
                nullable: true
                type: string
              expireTime:
                description: Time when the branch database should be deleted.
                format: date-time
                type: string
              migrations:
                description: Outcome of the branch's schema migrations.
                nullable: true
                properties:
                  error:
                    description: The migration tool's error output when `phase` is `Failed`.
                    nullable: true
                    type: string
                  observedGeneration:
                    description: The `metadata.generation` this run reconciled.
                    format: int64
                    type: integer
                  phase:
                    description: Phase of the migration run.
                    enum:
                    - Running
                    - Succeeded
                    - Failed
                    type: string
                required:
                - observedGeneration
                - phase
                type: object
              phase:
                enum:
                - Init
                - Pending
                - Ready
                - Failed
                type: string
              podName:
                nullable: true
                type: string
              sessionInfo:
                additionalProperties:
                  properties:
                    id:
                      description: Session id.
                      type: string
                    owner:
                      description: Owner info of the session.
                      properties:
                        hostname:
                          description: Hostname of the machine where the CLI command was executed.
                          type: string
                        k8sUsername:
                          description: Name of the Kubernetes user who's identity was assumed by the CLI.
                          type: string
                        userId:
                          description: Unique ID.
                          type: string
                        username:
                          description: Name of the POSIX user that executed the CLI command.
                          type: string
                      required:
                      - hostname
                      - k8sUsername
                      - userId
                      - username
                      type: object
                  required:
                  - id
                  - owner
                  type: object
                default: {}
                description: Information of sessions that are using this branch database.
                type: object
            required:
            - expireTime
            - phase
            type: object
        required:
        - spec
        title: PgBranchDatabase
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{ end }}
