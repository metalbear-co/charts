apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: mirrordkafkatopicsconsumers.queues.mirrord.metalbear.co
spec:
  group: queues.mirrord.metalbear.co
  names:
    kind: MirrordKafkaTopicsConsumer
    plural: mirrordkafkatopicsconsumers
    singular: mirrordkafkatopicsconsumer
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: Name of the topic consumer workload.
      jsonPath: .spec.consumerName
      name: CONSUMER-NAME
      type: string
    - description: Kind of the topic consumer workload.
      jsonPath: .spec.consumerKind
      name: CONSUMER-KIND
      type: string
    - description: Api version of the topic consumer workload.
      jsonPath: .spec.consumerApiVersion
      name: CONSUMER-API-VERSION
      type: string
    - description: Timeout for consumer workload restart.
      jsonPath: .spec.consumerRestartTimeout
      name: CONSUMER-RESTART-TIMEOUT
      type: string
    name: v1alpha
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for MirrordKafkaTopicsConsumerSpec via `CustomResource`
        properties:
          spec:
            description: |-
              Defines splittable Kafka topics consumed by some workload living in the same namespace.

              # Concurrent splitting

              Concurrent Kafka splitting sessions are allowed, as long as they use the same topic id or their
              topics' `nameSources` do not overlap.

              # Example

              ```yaml
              apiVersion: queues.mirrord.metalbear.co/v1alpha
              kind: MirrordKafkaTopicsConsumer
              metadata:
                name: example
                namespace: default
              spec:
                consumerName: example-deployment
                consumerApiVersion: apps/v1
                consumerKind: Deployment
                topics:
                  - id: example-topic
                    nameSources:
                      - directEnvVar:
                          container: example-container
                          name: KAFKA_TOPIC_NAME
                    groupIdSources:
                      - directEnvVar:
                          container: example-container
                          name: KAFKA_GROUP_ID
                    clientConfig: example-config
              ```

              1. Creating the resource below will enable Kafka splitting on a deployment `example-deployment`
                 living in namespace `default`. Id `example-topic` can be then used in the mirrord config to
                 split the topic for the duration of the mirrord session.

              2. Topic name will be resolved based on `example-deployment`'s pod template by extracting value
                 of variable `KAFKA_TOPIC_NAME` defined directly in `example-container`.

              3. Consumer group id used by the mirrord operator will be resolved based on
                 `example-deployment`'s pod template by extracting value of variable `KAFKA_GROUP_ID` defined
                 directly in `example-container`.

              4. For the duration of the session, `example-deployment` will be patched - the mirrord operator
                 will substitute topic name in `KAFKA_TOPIC_NAME` variable with a name of an ephemeral Kafka
                 topic.

              5. Local application will see a different value of the `KAFKA_TOPIC_NAME` - it will be a name of
                 another ephemeral Kafka topic.

              6. `MirrordKafkaClientConfig` named `example-config` living in mirrord operator's namespace will
                 be used to manage ephemeral Kafka topics and consume/produce messages.
            properties:
              consumerApiVersion:
                description: Workload api version, for example `apps/v1`.
                type: string
              consumerKind:
                description: Workload kind, for example `Deployment`.
                type: string
              consumerName:
                description: Workload name, for example `my-deployment`.
                type: string
              consumerRestartTimeout:
                description: |-
                  Timeout for waiting until workload patch takes effect, that is at least one pod reads from
                  the ephemeral topic.

                  Specified in seconds. Defaults to 60s.
                format: uint32
                minimum: 0.0
                nullable: true
                type: integer
              splitTtl:
                description: |-
                  Period of time to wait before cleaning up Kafka splits for this consumer and reverting Pod
                  template patches (in seconds).

                  For any given topic, starting the first Kafka splitting session requires patching the
                  target workload. Similarly, stopping the last Kafka splitting session requires another
                  patch, that reverts the first one.

                  If the target workload takes a long time to restart, it may be desirable to keep the Kafka
                  splits alive longer, so that the next Kafka splitting session will not have to patch
                  the workload again.
                format: uint32
                minimum: 0.0
                nullable: true
                type: integer
              topics:
                description: List of consumed splittable topics.
                items:
                  description: Splittable Kafka topic consumed by some remote target.
                  oneOf:
                  - required:
                    - groupIdSources
                  - required:
                    - applicationIdSources
                  properties:
                    applicationIdSources:
                      description: |-
                        All occurrences of this topic's application id in the workload's pod template.

                        Relevant only for Kafka Streams consumers.
                        Must be empty if `groupIdSources` is not empty.

                        Note that Kafka Streams consumers are supported only when the [`MirrordKafkaClientConfig`]
                        is configured to use the Java Kafka client implementation.
                      items:
                        description: Source of some topic property required for Kafka splitting.
                        oneOf:
                        - required:
                          - directEnvVar
                        properties:
                          directEnvVar:
                            description: Environment variable with value defined directly in the pod template.
                            properties:
                              container:
                                description: Name of the container.
                                type: string
                              fallback:
                                description: |-
                                  Fallback value to use when the variable is not found in the pod template.

                                  Only valid when `variable` is specified directly (not as a pattern).
                                  When the variable is absent and this is set, the fallback is used as the property value.
                                  The workload will still be patched to inject the variable with the split topic name.
                                nullable: true
                                type: string
                              variable:
                                description: Name of the variable.
                                type: string
                            required:
                            - container
                            - variable
                            type: object
                        type: object
                      type: array
                    clientConfig:
                      description: |-
                        Links to [`MirrordKafkaClientConfig`] in the operator's namespace.
                        This config will be used to manage ephemeral Kafka topics and consume/produce messages.
                      type: string
                    groupIdSources:
                      description: |-
                        All occurrences of this topic's group id in the workload's pod template.

                        Relevant only for standard Kafka consumers.
                        Must be empty if `applicationIdSources` is not empty.
                      items:
                        description: Source of some topic property required for Kafka splitting.
                        oneOf:
                        - required:
                          - directEnvVar
                        properties:
                          directEnvVar:
                            description: Environment variable with value defined directly in the pod template.
                            properties:
                              container:
                                description: Name of the container.
                                type: string
                              fallback:
                                description: |-
                                  Fallback value to use when the variable is not found in the pod template.

                                  Only valid when `variable` is specified directly (not as a pattern).
                                  When the variable is absent and this is set, the fallback is used as the property value.
                                  The workload will still be patched to inject the variable with the split topic name.
                                nullable: true
                                type: string
                              variable:
                                description: Name of the variable.
                                type: string
                            required:
                            - container
                            - variable
                            type: object
                        type: object
