apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: mirrordworkloadqueueregistries.queues.mirrord.metalbear.co
spec:
  group: queues.mirrord.metalbear.co
  names:
    kind: MirrordWorkloadQueueRegistry
    plural: mirrordworkloadqueueregistries
    shortNames:
    - qs
    singular: mirrordworkloadqueueregistry
  scope: Namespaced
  versions:
  - name: v1alpha
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for MirrordWorkloadQueueRegistrySpec via `CustomResource`
        properties:
          spec:
            description: |-
              Defines a Custom Resource that holds a central configuration for splitting queues for a
              QueueConsumer (a target workload for which queues should be split).

              This means there should be 1 such resource per queue splitting target.
            properties:
              consumer:
                description: The resource (deployment or Argo rollout) that reads from the queues.
                properties:
                  container:
                    description: |-
                      If a container is not specified, the workload queue registry will apply to every run that
                      targets any of the workload's containers.
                    nullable: true
                    type: string
                  name:
                    type: string
                  workloadType:
                    description: A workload that is a consumer of a queue that is being split.
                    enum:
                    - Deployment
                    - Rollout
                    type: string
                required:
                - name
                - workloadType
                type: object
              queues:
                additionalProperties:
                  properties:
                    queueType:
                      enum:
                      - SQS
                      - RMQ
                      type: string
                  required:
                  - queueType
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                description: |-
                  A map of the queues that should be split.
                  The key is used by users to associate filters to the right queues.
                type: object
              workloadRestartTimeout:
                description: |-
                  Timeout for waiting until workload patch takes effect, that is - at least one pod reads
                  from the main temporary queue.

                  Specified in seconds. Defaults to 120s.
                format: uint32
                minimum: 0.0
                nullable: true
                type: integer
            required:
            - consumer
            - queues
            type: object
          status:
            nullable: true
            properties:
              sqsDetails:
                description: |-
                  Optional even though it's currently the only field, because in the future there will be
                  fields for other queue types.
                nullable: true
                properties:
                  directEnvVars:
                    additionalProperties:
                      type: string
                    description: |-
                      Names of env vars that contain the queue name directly in the pod template, without config
                      map refs, mapped to their queue id.
                    type: object
                  envUpdates:
                    additionalProperties:
                      properties:
                        originalName:
                          type: string
                        outputName:
                          type: string
                      required:
                      - originalName
                      - outputName
                      type: object
                    type: object
                  queueNames:
                    additionalProperties:
                      properties:
                        originalName:
                          type: string
                        outputName:
                          type: string
                      required:
                      - originalName
                      - outputName
                      type: object
                    description: |-
                      For each queue_id, the actual queue name as retrieved from the target's pod spec or config
                      map, together with the name of its temporary output queue.
                    type: object
                required:
                - directEnvVars
                - envUpdates
                - queueNames
                type: object
            type: object
        required:
        - spec
        title: MirrordWorkloadQueueRegistry
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{ end }}
{{ if .Values.operator.sqsSplitting }}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: mirrordsqssessions.queues.mirrord.metalbear.co
spec:
  group: queues.mirrord.metalbear.co
  names:
    kind: MirrordSQSSession
    plural: mirrordsqssessions
    singular: mirrordsqssession
  scope: Namespaced
  versions:
  - name: v1alpha
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for MirrordSqsSessionSpec via `CustomResource`
        properties:
          spec:
            description: |-
              The operator creates this object when a user runs mirrord against a target that is a queue
              consumer.
            properties:
              outputQueueNames:
                additionalProperties:
                  type: string
                description: |-
                  Multi-cluster coordination: explicit output queue names.

                  Maps original queue names to their corresponding output queue names.
                  For multi-cluster: the default cluster creates temp queues and passes the exact names here.
                  Other clusters use these names directly instead of generating their own.
                type: object
              queueConsumer:
                description: The target of this session.
                properties:
                  container:
                    description: |-
                      If a container is not specified, the workload queue registry will apply to every run that
                      targets any of the workload's containers.
                    nullable: true
                    type: string
                  name:
                    type: string
                  workloadType:
                    description: A workload that is a consumer of a queue that is being split.
                    enum:
                    - Deployment
                    - Rollout
                    type: string
                required:
                - name
                - workloadType
                type: object
              queueFilters:
                additionalProperties:
                  additionalProperties:
                    type: string
                  type: object
                description: |-
                  For each queue_id, a mapping from attribute name, to attribute value regex.
                  The queue_id for a queue is determined at the queue registry. It is not (necessarily)
                  The name of the queue on AWS.
                type: object
              queueJqFilters:
                additionalProperties:
                  type: string
                description: |-
                  Specify jq programs that will be used to filter messages from queues.
                  For queues with a specified jq program, for every message the jq filter runs on a JSON
