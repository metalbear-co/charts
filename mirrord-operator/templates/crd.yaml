apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: mirrordpolicies.policies.mirrord.metalbear.co
spec:
  group: policies.mirrord.metalbear.co
  names:
    kind: MirrordPolicy
    plural: mirrordpolicies
    singular: mirrordpolicy
  scope: Namespaced
  versions:
  - name: v1alpha
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for MirrordPolicySpec via `CustomResource`
        properties:
          spec:
            description: |-
              Custom resource for policies that limit what mirrord features users can use.

              This policy applies only to resources living in the same namespace.
            properties:
              appliesToCopyTargets:
                default: false
                description: |-
                  Whether this policy applies also to sessions using the copy target feature.

                  By default, policies don't apply to copy target sessions.

                  Defaults to `false`.
                type: boolean
              block:
                description: List of features and operations blocked by this policy.
                items:
                  description: Features and operations that can be blocked by `mirrordpolicies` and `mirrordclusterpolicies`.
                  enum:
                  - steal
                  - steal-without-filter
                  - mirror
                  - copy-target-scale-down
                  type: string
                type: array
              env:
                default:
                  exclude: []
                description: |-
                  Controls how mirrord-operator handles user requests to fetch environment variables from the
                  target.
                properties:
                  exclude:
                    default: []
                    description: |-
                      List of environment variables that should be excluded when using mirrord.

                      These environment variables won't be retrieved from the target even if the user
                      specifies them in their `feature.env.include` mirrord config.

                      Variable names can be matched using `*` and `?` where `?` matches exactly one occurrence of
                      any character and `*` matches arbitrary many (including zero) occurrences of any character,
                      e.g. `DATABASE_*` will match `DATABASE_URL` and `DATABASE_PORT`.
                    items:
                      type: string
                    type: array
                type: object
              fs:
                default:
                  readOnly: []
                  local: []
                  notFound: []
                description: |-
                  Overrides fs ops behaviour, granting control over them to the operator policy, instead of
                  the user config.
                properties:
                  local:
                    default: []
                    description: |-
                      Files that cannot be opened at all.

                      Opening the file will be rejected and mirrord will open the file locally instead.
                    items:
                      type: string
                    type: array
                  notFound:
                    default: []
                    description: |-
                      Files that cannot be opened at all.

                      Opening the file is rejected with an IO error.
                    items:
                      type: string
                    type: array
                  readOnly:
                    default: []
                    description: |-
                      Files that cannot be opened for writing.

                      Opening the file for writing is rejected with an IO error.
                    items:
                      type: string
                    type: array
                type: object
              network:
                default:
                  incoming:
                    httpFilter:
                      headerFilter: null
                  outgoing:
                    allow: []
                    block: []
                description: |-
                  Fine grained control over network features like specifying required HTTP filters and
                  limiting outgoing connections.
                properties:
                  incoming:
                    default:
                      httpFilter:
                        headerFilter: null
                    description: Incoming network operations policy that partially mimics the mirrord `network.incoming` config.
                    properties:
                      httpFilter:
                        default:
                          headerFilter: null
                        description: Http filter policy that allows to specify requirements for the HTTP filter used in a session.
                        properties:
                          headerFilter:
                            description: |-
                              Require the user's header filter to match this regex, if such filter is provided.

                              This auto enables `steal-without-filter` policy block to require that the user specifies a
                              header filter for the network steal feature.

                              # Composed filters

                              When the user requests an `all_of` HTTP filter, at least one of the nested filters
                              must be a header filter that matches this regex. At least one nested filter is required.

                              When the user requests an `any_of` HTTP filter, all nested header filters must match this
                              regex. At least one nested header filter is required.
                            nullable: true
                            type: string
                        type: object
                    type: object
                  outgoing:
                    default:
                      allow: []
                      block: []
                    description: Outgoing network operations policy that partially mimics the mirrord `network.outgoing` config.
                    properties:
                      allow:
                        default: []
                        description: |-
                          List of allowed outgoing connections.
                          If specified, only connections matching these rules will be permitted.
                          Evaluated before `block` rules, so a connection that matches both will be blocked.
                        items:
                          description: A rule describing outgoing network connections (for either allow or block lists).
                          properties:
                            hostname:
                              description: Regex pattern for matching hostnames.
                              nullable: true
                              type: string
                            ipBlock:
                              description: IP-based destination rules.
                              nullable: true
                              properties:
                                cidr:
                                  description: CIDR notation of the IP range (e.g., "10.0.0.0/16").
                                  type: string
                                except:
                                  default: []
                                  description: List of CIDR ranges to exclude from the IP range.
                                  items:
                                    type: string
                                  type: array
                              required:
                              - cidr
                              type: object
                            ports:
                              default: []
                              description: |-
                                List of ports and protocols this rule applies to.
                                If not specified, the rule applies to all ports.
                              items:
                                description: Port and protocol specification for outgoing connections.
                                properties:
                                  port:
                                    description: Port number.
                                    format: uint16
                                    maximum: 65535.0
                                    minimum: 0.0
                                    type: integer
                                  protocol:
                                    description: Network protocol (TCP or UDP).
                                    enum:
                                    - TCP
                                    - UDP
                                    type: string
                                required:
                                - port
                                - protocol
                                type: object
                              type: array
                          type: object
                        type: array
                      block:
                        default: []
                        description: |-
                          List of blocked outgoing connections.
                          If specified, connections matching these rules will be denied.
                          Evaluated after `allow` rules, so a connection that matches both will be blocked.
                        items:
                          description: A rule describing outgoing network connections (for either allow or block lists).
                          properties:
                            hostname:
                              description: Regex pattern for matching hostnames.
                              nullable: true
                              type: string
                            ipBlock:
                              description: IP-based destination rules.
                              nullable: true
                              properties:
                                cidr:
                                  description: CIDR notation of the IP range (e.g., "10.0.0.0/16").
                                  type: string
                                except:
                                  default: []
                                  description: List of CIDR ranges to exclude from the IP range.
                                  items:
                                    type: string
                                  type: array
                              required:
                              - cidr
                              type: object
                            ports:
                              default: []
                              description: |-
                                List of ports and protocols this rule applies to.
                                If not specified, the rule applies to all ports.
                              items:
                                description: Port and protocol specification for outgoing connections.
                                properties:
                                  port:
                                    description: Port number.
                                    format: uint16
                                    maximum: 65535.0
                                    minimum: 0.0
                                    type: integer
                                  protocol:
                                    description: Network protocol (TCP or UDP).
                                    enum:
                                    - TCP
                                    - UDP
                                    type: string
                                required:
                                - port
                                - protocol
                                type: object
                              type: array
                          type: object
                        type: array
                    type: object
                type: object
              profileAllowlist:
                description: |-
                  A list of allowed mirrord profiles.

                  If multiple policies apply to a session,
                  user's mirrord profile must be present in all allowlists.

                  Mind that mirrord profiles are only a functional feature.
                  mirrord Operator is not able to enforce that the
                  application running on the user's machine follows the selected profile.

                  This setting should not be used in order to prevent malicious actions.

                  Optional.
                items:
                  type: string
                nullable: true
                type: array
              requireProfile:
                default: false
                description: |-
                  Enforces that the user selects a mirrord profile for their session.

                  Mind that mirrord profiles are only a functional feature.
                  mirrord Operator is not able to enforce that the
                  application running on the user's machine follows the selected profile.

                  This setting should not be used in order to prevent malicious actions.

                  Defaults to `false`.
                type: boolean
              selector:
                description: |-
                  If specified in a policy, the policy will only apply to targets with labels that match all
                  of the selector's rules.
                nullable: true
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements. The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values. Valid operators are In, NotIn,
                            Exists and DoesNotExist.
                          enum:
                          - In
                          - NotIn
                          - Exists
                          - DoesNotExist
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn, the values array must
                            be non-empty. If the operator is Exists or DoesNotExist, the values array must be empty.
                            This array is replaced during a strategic merge patch.
                          items:
                            type: string
                          nullable: true
                          type: array
                      required:
                      - key
                      - operator
                      type: object
                    nullable: true
                    type: array
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels map is
                      equivalent to an element of matchExpressions, whose key field is "key", the operator is
                      "In", and the values array contains only "value". The requirements are ANDed.
                    nullable: true
                    type: object
                type: object
              targetPath:
                description: |-
                  Specify the targets for which this policy applies, in the pod/my-pod deploy/my-deploy
                  notation. Targets can be matched using `*` and `?` where `?` matches exactly one
                  occurrence of any character and `*` matches arbitrary many (including zero) occurrences
                  of any character. If not specified, this policy does not depend on the target's path.
                nullable: true
                type: string
            required:
            - block
            type: object
        required:
        - spec
        title: MirrordPolicy
        type: object
    served: true
    storage: true
    subresources: {}
---
