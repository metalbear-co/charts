apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: mirrordclustersplitsessions.queues.mirrord.metalbear.co
spec:
  group: queues.mirrord.metalbear.co
  names:
    kind: MirrordClusterSplitSession
    plural: mirrordclustersplitsessions
    singular: mirrordclustersplitsession
  scope: Cluster
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for MirrordClusterSplitSessionSpec via `CustomResource`
        properties:
          spec:
            description: |-
              Represents one active queue-splitting session.

              When a developer runs mirrord with queue splitting, the operator creates one of
              these to track the session. The session controller watches it and does the actual
              work: creating temporary topics/subscriptions, starting the message forwarder, and
              updating the status so the CLI knows when the session is ready or has failed.

              This resource is cluster-scoped (not namespaced) because its owner,
              `MirrordClusterSession`, is also cluster-scoped. Kubernetes only allows owner
              references between resources in the same scope, so we store the target workload's
              namespace as a field in the spec instead.
            properties:
              namespace:
                description: Namespace of the target workload (same as the MirrordSplitConfig namespace).
                type: string
              owner:
                description: The developer who initiated this session.
                properties:
                  hostname:
                    type: string
                  k8sUsername:
                    type: string
                  userId:
                    type: string
                  username:
                    type: string
                required:
                - hostname
                - k8sUsername
                - userId
                - username
                type: object
              queues:
                description: Queues to split in this session. Each entry references a queue ID from MirrordSplitConfig.
                items:
                  properties:
                    headersFilter:
                      additionalProperties:
                        type: string
                      description: Regex-based header/attribute filters. Keys are attribute names, values are regex patterns.
                      nullable: true
                      type: object
                    id:
                      description: Queue ID from MirrordSplitConfig.
                      type: string
                    jqFilter:
                      description: JQ-style filter on the queue-kind-specific structured message.
                      nullable: true
                      type: string
                    kind:
                      description: Broker kind for this queue.
                      enum:
                      - sqs
                      - kafka
                      - rmq
                      - googlePubSub
                      - azureServiceBus
                      - redisPubSub
                      - temporal
                      - bullMq
                      - unknown
                      type: string
                    mode:
                      description: |-
                        Whether matched messages are stolen from the workload or mirrored to it. Absent means
                        `steal`, so sessions created by older clients keep the original behavior.
                      enum:
                      - steal
                      - mirror
                      type: string
                  required:
                  - id
                  - kind
                  type: object
                type: array
              sessionKey:
                description: Optional session key for backwards compatibility with existing session management.
                nullable: true
                type: string
              target:
                description: The target workload for this split session.
                properties:
                  apiVersion:
                    type: string
                  container:
                    nullable: true
                    type: string
                  kind:
                    type: string
                  name:
                    type: string
                required:
                - apiVersion
                - kind
                - name
                type: object
            required:
            - namespace
            - owner
            - queues
            - target
            type: object
          status:
            nullable: true
            oneOf:
            - required:
              - starting
            - required:
              - resourcesReady
            - required:
              - ready
            - required:
              - startError
            - required:
              - cleanupError
            properties:
              cleanupError:
                properties:
                  details:
                    nullable: true
                    properties:
                      envUpdates:
                        additionalProperties:
                          items:
                            properties:
                              name:
                                type: string
                              value:
                                type: string
                            required:
                            - name
                            - value
                            type: object
                          type: array
                        description: |-
                          Environment variable updates for each container. The workload patch applies these
                          so the application reads from temporary resources instead of originals.
                        type: object
                      tmpResources:
                        description: Temporary resources created for each queue, keyed by queue ID.
                        items:
                          properties:
                            channel:
                              additionalProperties:
                                type: string
                              description: |-
                                Maps original Redis channel name to temporary channel name.
                                One entry per physical channel managed under this queue_id.
                              type: object
                            queue:
                              additionalProperties:
                                type: string
                              description: |-
                                Maps original queue name to temporary queue name (RabbitMQ). One entry
                                per physical queue managed under this queue_id.
                              type: object
                            queueId:
                              description: Queue ID from MirrordSplitConfig.
                              type: string
                            subscription:
                              additionalProperties:
                                type: string
                              description: |-
                                Maps original subscription name to temporary subscription name.
                                One entry per physical subscription managed under this queue_id.
                              type: object
                            taskQueue:
                              additionalProperties:
                                type: string
                              description: Maps original Temporal task queue name to virtual task queue name.
                              type: object
                            topic:
                              additionalProperties:
                                type: string
                              description: |-
                                Maps original topic name to temporary topic name. One entry per
                                physical topic managed under this queue_id.
                              type: object
                          required:
                          - queueId
                          type: object
                        type: array
                    type: object
                  error:
                    properties:
                      code:
                        format: uint16
                        maximum: 65535.0
                        minimum: 0.0
                        type: integer
                      message:
                        type: string
                      reason:
                        type: string
                    required:
