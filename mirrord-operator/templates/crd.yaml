                        topic:
                          additionalProperties:
                            type: string
                          description: |-
                            Maps original topic name to temporary topic name. One entry per
                            physical topic managed under this queue_id.
                          type: object
                      required:
                      - queueId
                      type: object
                    type: array
                type: object
              resourcesReady:
                description: |-
                  Broker resources (topics, subscriptions) have been created and their
                  names are available, but the target pod has not restarted yet. The
                  envoy watches for this status so it can forward resource names to
                  remote clusters without waiting for the full pod restart.
                properties:
